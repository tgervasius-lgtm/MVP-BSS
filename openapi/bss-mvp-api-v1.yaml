        - $ref: '#/components/parameters/IfMatch'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Own pending correction request cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionRequest'
  /report-exports:
    get:
      tags: [Reports]
      operationId: listReportExports
      summary: List Report Exports
      x-bss-roles: [admin, manager, accountant]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Export history inside effective role scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExportPage'
    post:
      tags: [Reports]
      operationId: createReportExport
      summary: Create Report Export
      x-bss-roles: [admin, manager, accountant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportExportWrite'
      responses:
        '202':
          description: Versioned export job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExport'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /report-previews:
    post:
      tags: [Reports]
      operationId: createReportPreview
      summary: Create Report Preview
      x-bss-roles: [admin, manager, accountant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportPreviewWrite'
      responses:
        '200':
          description: Bounded preview generated by the same normalized filters and scoped query family used for export.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportPreview'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /report-exports/{exportId}:
    get:
      tags: [Reports]
      operationId: getReportExport
      summary: Get Report Export
      x-bss-roles: [admin, manager, accountant]
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export status and short-lived download URL when ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExport'
        '404':
          $ref: '#/components/responses/NotFound'
  /report-exports/{exportId}/download:
    get:
      tags: [Reports]
      operationId: downloadReportExport
      summary: Download Report Export
      x-bss-roles: [admin, manager, accountant]
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Ready, unexpired report artifact generated from the authoritative dataset.
          headers:
            Content-Disposition:
              schema:
                type: string
            X-Content-SHA256:
              schema:
                type: string
                pattern: '^[a-f0-9]{64}$'
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
  /audit-events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      summary: List Audit Events
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - name: module
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Append-only audit events; no mutation endpoint exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPage'
  /terminals:
    get:
      tags: [Terminals]
      operationId: listTerminals
      summary: List Terminals
      x-bss-roles: [admin, manager]
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Terminal state and latest heartbeat; manager is read-only.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Terminal'
  /terminals/pair:
    post:
      tags: [Terminals]
      operationId: pairTerminal
      summary: Pair Terminal
      x-bss-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalPairRequest'
      responses:
        '201':
          description: Paired terminal. Device credential is returned once and never logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalPairResult'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /terminals/{terminalId}/revoke:
    post:
      tags: [Terminals]
      operationId: revokeTerminal
      summary: Revoke Terminal
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/TerminalId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Terminal identity revoked without deleting historical events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Terminal'
  /terminals/{terminalId}/sync-events:
    get:
      tags: [Terminals]
      operationId: listTerminalSyncEvents
      summary: List Terminal Sync Events
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/TerminalId'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - name: eventStatus
          in: query
          schema:
            $ref: '#/components/schemas/TerminalEventStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Terminal synchronization evidence in effective tenant scope, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSyncEventPage'
  /terminal/v1/events/batch:
    post:
      tags: [Terminals]
      operationId: ingestTerminalEventBatch
      summary: Ingest Terminal Event Batch
      security:
        - deviceSignature: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - $ref: '#/components/parameters/DeviceTimestamp'
        - $ref: '#/components/parameters/DeviceNonce'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalEventBatch'
      responses:
        '200':
          description: Per-event idempotent acceptance result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalEventBatchResult'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /terminal/v1/heartbeat:
    post:
      tags: [Terminals]
      operationId: terminalHeartbeat
      summary: Terminal Heartbeat
      security:
        - deviceSignature: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - $ref: '#/components/parameters/DeviceTimestamp'
        - $ref: '#/components/parameters/DeviceNonce'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalHeartbeat'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '204':
          description: Heartbeat accepted.
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: bss_session
      description: Secure, HttpOnly, SameSite session cookie.
    deviceSignature:
      type: apiKey
      in: header
      name: X-BSS-Signature
      description: |
        HMAC-SHA256 v1. The terminal signs UTF-8 bytes of
        METHOD + "\n" + PATH + "\n" + SHA256_HEX(BODY) + "\n" + X-BSS-Timestamp + "\n" + X-BSS-Nonce.
        The signature is lowercase hexadecimal. Server resolves X-BSS-Device-Id inside the tenant-owned
        encrypted credential store, permits at most 300 seconds clock skew and atomically consumes each nonce.
  parameters:
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: Current entity revision/ETag; stale writes return 409.
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    FromDate:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date
    ToDate:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date
    Year:
      name: year
      in: query
      required: true
      schema:
        type: integer
        minimum: 2020
        maximum: 2100
    DepartmentId:
      name: departmentId
      in: query
      schema:
        type: string
    DepartmentIdPath:
      name: departmentId
      in: path
      required: true
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [active, blocked]
    WorkerIdQuery:
      name: workerId
      in: query
      schema:
        type: string
    WorkerId:
      name: workerId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    ShiftId:
      name: shiftId
      in: path
      required: true
      schema:
        type: string
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
    TerminalId:
      name: terminalId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: X-BSS-Device-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    DeviceTimestamp:
      name: X-BSS-Timestamp
      in: header
      required: true
      description: RFC 3339 UTC timestamp; maximum accepted clock skew is 300 seconds.
      schema:
        type: string
        format: date-time
    DeviceNonce:
      name: X-BSS-Nonce
      in: header
      required: true
      description: Cryptographically random single-use base64url nonce, retained until its replay window expires.
      schema:
        type: string
        minLength: 22
        maxLength: 128
  requestBodies:
    Decision:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DecisionWrite'
    RequiredDecision:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RequiredDecisionWrite'
  responses:
    Unauthenticated:
      description: Missing, invalid or expired identity.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Authenticated identity is outside the required role or data scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource does not exist inside effective scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationFailed:
      description: Stable domain or field validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Invalid state transition, overlap, duplicate or stale revision.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Role:
      type: string
      enum: [admin, manager, worker, accountant]
    RequestStatus:
      type: string
      enum: [pending, approved, rejected, cancelled]
    AttendanceStatus:
      type: string
      enum: [active, complete, late, incomplete, corrected]
    TerminalEventStatus:
      type: string
      enum: [queued, synced, duplicate, rejected]
    EntityStatus:
      type: string
      enum: [active, blocked]
    Revision:
      type: string
      description: Opaque optimistic-concurrency revision.
    PageMeta:
      type: object
      required: [nextCursor]
      properties:
        nextCursor:
          type: [string, 'null']
        total:
          type: [integer, 'null']
          minimum: 0
    Problem:
      type: object
      additionalProperties: false
      required: [code, message, requestId]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]+$'
        message:
          type: string
        requestId:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 12
    InvitationAcceptRequest:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 256
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 1024
    SessionContext:
      type: object
      additionalProperties: false
      required: [user, organization, effectiveScope]
      properties:
        user:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        effectiveScope:
          type: object
          required: [role, departmentIds, selfWorkerId]
          properties:
            role:
              $ref: '#/components/schemas/Role'
            departmentIds:
              type: array
              items:
                type: string
            selfWorkerId:
              type: [string, 'null']
    DashboardKpi:
      type: object
      additionalProperties: false
      required: [id, value, targetScreen, filters]
      properties:
        id:
          type: string
          enum: [present, absent_today, review_required, pending_decision, worked_minutes, balance_minutes, available_leave]
        value:
          type: integer
        targetScreen:
          type: string
          enum: [attendance, requests, corrections, reports, mytime, vacations]
        filters:
          type: object
          additionalProperties:
            type: string
    DashboardSummary:
      type: object
      additionalProperties: false
      required: [date, role, kpis, datasetVersion]
      properties:
        date:
          type: string
          format: date
        role:
          $ref: '#/components/schemas/Role'
        kpis:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/DashboardKpi'
        datasetVersion:
          type: string
    ApprovedLeaveVisibility:
      type: string
      enum: [team, department, organization]
    Organization:
      type: object
      required: [id, name, timezone, approvedLeaveVisibility, revision]
      properties:
        id:
          type: string
        name:
          type: string
        taxIdentifier:
          type: string
        timezone:
          type: string
          examples: [Europe/Zagreb]
        approvedLeaveVisibility:
          $ref: '#/components/schemas/ApprovedLeaveVisibility'
        revision:
          $ref: '#/components/schemas/Revision'
    OrganizationPatch:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 160
        taxIdentifier:
          type: string
          maxLength: 32
        timezone:
          type: string
        approvedLeaveVisibility:
          $ref: '#/components/schemas/ApprovedLeaveVisibility'
    Department:
      type: object
      required: [id, name, status, revision]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/EntityStatus'
        revision:
          $ref: '#/components/schemas/Revision'
    DepartmentWrite:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
    DepartmentPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        status:
          $ref: '#/components/schemas/EntityStatus'
    Holiday:
      type: object
      required: [id, date, name, revision]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        name:
          type: string
        revision:
          $ref: '#/components/schemas/Revision'
    HolidayWrite:
      type: object
      additionalProperties: false
      required: [date, name]
      properties:
        date:
          type: string
          format: date
        name:
          type: string
          minLength: 2
          maxLength: 120
    User:
      type: object
      required: [id, email, role, status, departmentIds, revision]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/EntityStatus'
        workerId:
          type: [string, 'null']
        departmentIds:
          type: array
          items:
            type: string
        revision:
          $ref: '#/components/schemas/Revision'
    UserInvite:
      type: object
      additionalProperties: false
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        workerId:
          type: [string, 'null']
        departmentIds:
          type: array
          items:
            type: string
    UserInvitation:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [invitationUrl, expiresAt]
          properties:
            invitationUrl:
              type: string
              format: uri
              writeOnly: true
              description: One-time URL fragment; never persisted in plaintext and never returned again.
            expiresAt:
              type: string
              format: date-time
    UserPatch:
      type: object
      additionalProperties: false
      properties:
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/EntityStatus'
        departmentIds:
          type: array
          items:
            type: string
    UserPage:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          $ref: '#/components/schemas/PageMeta'
    Worker:
      type: object
      required: [id, code, name, departmentId, shiftId, status, annualLeaveAllowance, revision]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        email:
          type: [string, 'null']
          format: email
        departmentId:
          type: string
        shiftId:
          type: string
        status:
          $ref: '#/components/schemas/EntityStatus'
        annualLeaveAllowance:
          type: integer
          minimum: 0
        revision:
          $ref: '#/components/schemas/Revision'
    WorkerWrite:
      type: object
      additionalProperties: false
      required: [code, name, departmentId, shiftId, annualLeaveAllowance]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 40
        name:
          type: string
          minLength: 2
          maxLength: 160
        email:
          type: [string, 'null']
          format: email
        departmentId:
          type: string
        shiftId:
          type: string
        annualLeaveAllowance:
          type: integer
          minimum: 0
          maximum: 366
    WorkerPage:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Worker'
        page:
          $ref: '#/components/schemas/PageMeta'
    Shift:
      type: object
      required: [id, name, startTime, endTime, breakMinutes, toleranceMinutes, assignedWorkerCount, revision]
      properties:
        id:
          type: string
        name:
          type: string
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        breakMinutes:
          type: integer
          minimum: 0
        toleranceMinutes:
          type: integer
          minimum: 0
        assignedWorkerCount:
          type: integer
          minimum: 0
        revision:
          $ref: '#/components/schemas/Revision'
    ShiftWrite:
      type: object
      additionalProperties: false
      required: [name, startTime, endTime, breakMinutes, toleranceMinutes]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        startTime:
          type: string
        endTime:
          type: string
        breakMinutes:
          type: integer
          minimum: 0
          maximum: 960
        toleranceMinutes:
          type: integer
          minimum: 0
          maximum: 240
    RfidCard:
      type: object
      required: [id, maskedUid, workerId, status, validFrom, revision]
      properties:
        id:
          type: string
        maskedUid:
          type: string
        workerId:
          type: string
        status:
          $ref: '#/components/schemas/EntityStatus'
        validFrom:
          type: string
          format: date-time
        validTo:
          type: [string, 'null']
          format: date-time
        revision:
          $ref: '#/components/schemas/Revision'
    RfidCardAssign:
      type: object
      additionalProperties: false
      required: [uid]
      properties:
        uid:
          type: string
          minLength: 8
          maxLength: 128
          description: Read once over TLS; normalized, peppered/HMAC-hashed and never returned or logged.
        validFrom:
          type: string
          format: date-time
    AttendanceDay:
      type: object
      required: [id, workerId, workDate, shift, status, workedMinutes, plannedMinutes, balanceMinutes, revision]
      properties:
        id:
          type: string
        workerId:
          type: string
        workDate:
          type: string
          format: date
        shift:
          $ref: '#/components/schemas/ShiftSnapshot'
        checkIn:
          type: [string, 'null']
          format: date-time
        checkOut:
          type: [string, 'null']
          format: date-time
        breakMinutes:
          type: integer
          minimum: 0
        workedMinutes:
          type: integer
          minimum: 0
        plannedMinutes:
          type: integer
          minimum: 0
        balanceMinutes:
          type: integer
        status:
          $ref: '#/components/schemas/AttendanceStatus'
        source:
          type: string
          enum: [terminal, approved_correction]
        revision:
          $ref: '#/components/schemas/Revision'
    ShiftSnapshot:
      type: object
      required: [id, name, startTime, endTime, breakMinutes]
      properties:
        id:
          type: string
        name:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        breakMinutes:
          type: integer
    AttendanceTotals:
      type: object
      required: [rowCount, completedCount, activeCount, reviewCount, workedMinutes, plannedMinutes, balanceMinutes]
      properties:
        rowCount:
          type: integer
        completedCount:
          type: integer
        activeCount:
          type: integer
        reviewCount:
          type: integer
        workedMinutes:
          type: integer
        plannedMinutes:
          type: integer
        balanceMinutes:
          type: integer
    AttendancePage:
      type: object
      required: [items, totals, page, datasetVersion]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceDay'
        totals:
          $ref: '#/components/schemas/AttendanceTotals'
        page:
          $ref: '#/components/schemas/PageMeta'
        datasetVersion:
          type: string

      type: object
      additionalProperties: false
      required: [sentAt, sequence, queueDepth, softwareVersion]
      properties:
        sentAt:
          type: string
          format: date-time
        sequence:
          type: integer
          minimum: 1
          description: Latest sequence observed by the terminal for diagnostics only. Heartbeat does not acknowledge or advance the server event-ingestion cursor.
        queueDepth:
          type: integer
          minimum: 0
        softwareVersion:
          type: string
        deviceClockOffsetSeconds:
          type: integer

openapi: 3.1.0
info:
  title: BSS MVP API
  version: 1.1.0
  summary: Implemented Backend MVP contract for the frozen BSS Frontend v1.0.0.
  description: |
    Implemented versioned contract for the functional Backend MVP; deployment remains a separate
    operational decision. The server derives organization,
    role and department scope from the verified session/device identity. Client-supplied
    scope is never authorization evidence. CSV and XLSX are the currently approved export
    formats. PDF is approved as a professional business export in v1.1.
  x-bss-status: MVP_IMPLEMENTED
  x-bss-contract-reviewed-at: 2026-07-17
  x-bss-frontend-release: frontend-v1.0.0
  x-bss-baseline-commit: 91323c7cdbbbbf7b965c4926c94a11af6d31bf62
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Same-origin application API
tags:
  - name: Auth
    description: Browser authentication, invitation acceptance and secure sessions.
  - name: Dashboard
    description: Role-scoped KPI summaries with deterministic drill-down targets.
  - name: Organization
    description: Organization settings, departments and working calendars.
  - name: Users
    description: User accounts, invitations, roles and department scope.
  - name: Workers
    description: Workers and privacy-safe RFID assignment lifecycle.
  - name: Shifts
    description: Shift configuration and assignment counts.
  - name: Attendance
    description: Scoped attendance evidence, derived days and totals.
  - name: Leave
    description: Leave requests, decisions and authoritative annual balances.
  - name: Corrections
    description: Auditable requests to correct derived attendance records.
  - name: Reports
    description: Bounded previews and professional CSV/XLSX export jobs.
  - name: Audit
    description: Append-only administrative evidence.
  - name: Terminals
    description: Terminal identity, synchronization, event ingestion and heartbeat.
security:
  - sessionCookie: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session and current user context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      summary: Refresh Session
      security: []
      responses:
        '204':
          description: Session cookie rotated.
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /auth/invitations/accept:
    post:
      tags: [Auth]
      operationId: acceptInvitation
      summary: Accept Invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
      responses:
        '200':
          description: Invitation accepted, password set and secure session created atomically.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '204':
          description: Session invalidated and cookie cleared.
  /me:
    get:
      tags: [Auth]
      operationId: getSessionContext
      summary: Get Session Context
      responses:
        '200':
          description: Verified user, organization and effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /dashboard-summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Get Dashboard Summary
      x-bss-roles: [admin, manager, worker, accountant]
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: At most four role-scoped KPI values; every KPI includes a deterministic drill-down target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
  /organization:
    get:
      tags: [Organization]
      operationId: getOrganization
      summary: Get Organization
      x-bss-roles: [admin]
      responses:
        '200':
          description: Current organization settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Organization]
      operationId: updateOrganization
      summary: Update Organization
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationPatch'
      responses:
        '200':
          description: Updated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '409':
          $ref: '#/components/responses/Conflict'
  /departments:
    get:
      tags: [Organization]
      operationId: listDepartments
      summary: List Departments
      x-bss-roles: [admin, manager, worker]
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Departments inside the effective scope.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
    post:
      tags: [Organization]
      operationId: createDepartment
      summary: Create Department
      x-bss-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentWrite'
      responses:
        '201':
          description: Department created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /departments/{departmentId}:
    patch:
      tags: [Organization]
      operationId: updateDepartment
      summary: Update Department
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/DepartmentIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentPatch'
      responses:
        '200':
          description: Department updated or blocked while historical relations remain retained.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '409':
          $ref: '#/components/responses/Conflict'
  /holidays:
    get:
      tags: [Organization]
      operationId: listHolidays
      summary: List Holidays
      parameters:
        - $ref: '#/components/parameters/Year'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Organization holidays used for working-day calculations.
          headers:
            ETag:
              description: Aggregate revision of the requested organization/year calendar.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Holiday'
    put:
      tags: [Organization]
      operationId: replaceHolidaysForYear
      summary: Replace Holidays For Year
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/Year'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/HolidayWrite'
      responses:
        '200':
          description: Stored holiday calendar.
          headers:
            ETag:
              description: New aggregate revision of the organization/year calendar.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Holiday'
        '409':
          $ref: '#/components/responses/Conflict'
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List Users
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Organization user accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
    post:
      tags: [Users]
      operationId: inviteUser
      summary: Invite User
      x-bss-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInvite'
      responses:
        '202':
          description: Invitation created. The one-time fragment URL is returned only in this no-store administrator response for secure manual delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInvitation'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /users/{userId}:
    patch:
      tags: [Users]
      operationId: updateUser
      summary: Update User
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: Updated user and effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
  /workers:
    get:
      tags: [Workers]
      operationId: listWorkers
      summary: List Workers
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/DepartmentId'
        - $ref: '#/components/parameters/Status'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Workers inside the verified effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerPage'
    post:
      tags: [Workers]
      operationId: createWorker
      summary: Create Worker
      x-bss-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerWrite'
      responses:
        '201':
          description: Worker created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /workers/{workerId}:
    get:
      tags: [Workers]
      operationId: getWorker
      summary: Get Worker
      x-bss-roles: [admin, manager, worker]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Worker in effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Workers]
      operationId: updateWorker
      summary: Update Worker
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerWrite'
      responses:
        '200':
          description: Worker updated without deleting history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        '409':
          $ref: '#/components/responses/Conflict'
  /workers/{workerId}/deactivate:
    post:
      tags: [Workers]
      operationId: deactivateWorker
      summary: Deactivate Worker
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Worker blocked while historical records are retained.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /shifts:
    get:
      tags: [Shifts]
      operationId: listShifts
      summary: List Shifts
      x-bss-roles: [admin, manager, worker]
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Organization shifts with assignment counts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shift'
    post:
      tags: [Shifts]
      operationId: createShift
      summary: Create Shift
      x-bss-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftWrite'
      responses:
        '201':
          description: Shift created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /shifts/{shiftId}:
    patch:
      tags: [Shifts]
      operationId: updateShift
      summary: Update Shift
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/ShiftId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftWrite'
      responses:
        '200':
          description: Shift updated; historical attendance remains linked to its recorded plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '409':
          $ref: '#/components/responses/Conflict'
  /workers/{workerId}/activate:
    post:
      tags: [Workers]
      operationId: activateWorker
      summary: Reactivate Worker
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Worker reactivated while retained history remains unchanged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        '409':
          $ref: '#/components/responses/Conflict'
  /rfid-cards/{cardId}/block:
    post:
      tags: [Workers]
      operationId: blockRfidCard
      summary: Block Rfid Card
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Card blocked; historical assignments remain available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfidCard'
  /workers/{workerId}/rfid-cards:
    get:
      tags: [Workers]
      operationId: listWorkerRfidCards
      summary: List Worker Rfid Cards
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Masked RFID assignments for a worker inside effective scope; raw UID is never returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RfidCard'
    post:
      tags: [Workers]
      operationId: assignWorkerRfidCard
      summary: Assign Worker Rfid Card
      x-bss-roles: [admin]
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RfidCardAssign'
      responses:
        '201':
          description: RFID UID normalized, peppered/HMAC-hashed and assigned; response contains only a masked UID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfidCard'
        '409':
          $ref: '#/components/responses/Conflict'
  /attendance:
    get:
      tags: [Attendance]
      operationId: listAttendance
      summary: List Attendance
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/DepartmentId'
        - $ref: '#/components/parameters/WorkerIdQuery'
        - name: attendanceStatus
          in: query
          schema:
            $ref: '#/components/schemas/AttendanceStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Attendance rows and server-authoritative totals inside effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePage'
  /workers/{workerId}/attendance:
    get:
      tags: [Attendance]
      operationId: getWorkerAttendance
      summary: Get Worker Attendance
      x-bss-roles: [admin, manager, worker]
      description: Worker may request only self; server ignores client identity claims and checks the session.
      parameters:
        - $ref: '#/components/parameters/WorkerId'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Attendance rows and authoritative totals for the permitted worker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePage'
        '403':
          $ref: '#/components/responses/Forbidden'
  /approved-leave-calendar:
    get:
      tags: [Leave]
      operationId: listApprovedLeaveCalendar
      summary: List Privacy-safe Approved Leave Calendar
      x-bss-roles: [admin, manager, worker, accountant]
      description: Returns only employee name and approved annual-leave dates inside the configured organization, department or team visibility boundary.
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Privacy-safe approved annual leave calendar without notes, illness or other absence reasons.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedLeaveCalendar'
        '403':
          $ref: '#/components/responses/Forbidden'
  /leave-requests:
    get:
      tags: [Leave]
      operationId: listLeaveRequests
      summary: List Leave Requests
      x-bss-roles: [admin, manager, worker, accountant]
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/DepartmentId'
        - name: leaveStatus
          in: query
          schema:
            $ref: '#/components/schemas/RequestStatus'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Leave requests inside effective role scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequestPage'
    post:
      tags: [Leave]
      operationId: createLeaveRequest
      summary: Create Leave Request
      x-bss-roles: [worker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestWrite'
      responses:
        '201':
          description: Pending leave request with server-calculated working days.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /leave-balances:
    get:
      tags: [Leave]
      operationId: listLeaveBalances
      summary: List Leave Balances
      x-bss-roles: [admin, manager, worker, accountant]
      parameters:
        - $ref: '#/components/parameters/Year'
        - $ref: '#/components/parameters/DepartmentId'
        - $ref: '#/components/parameters/WorkerIdQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Server-authoritative annual allowance, approved, planned and available working days in effective scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveBalancePage'
  /leave-requests/{requestId}/approve:
    post:
      tags: [Leave]
      operationId: approveLeaveRequest
      summary: Approve Leave Request
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        $ref: '#/components/requestBodies/Decision'
      responses:
        '200':
          description: Approved request and updated revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /leave-requests/{requestId}/reject:
    post:
      tags: [Leave]
      operationId: rejectLeaveRequest
      summary: Reject Leave Request
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        $ref: '#/components/requestBodies/RequiredDecision'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Rejected request with mandatory decision note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
  /leave-requests/{requestId}/cancel:
    post:
      tags: [Leave]
      operationId: cancelOwnLeaveRequest
      summary: Cancel Own Leave Request
      x-bss-roles: [worker]
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Own pending request cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /correction-requests:
    get:
      tags: [Corrections]
      operationId: listCorrectionRequests
      summary: List Correction Requests
      x-bss-roles: [admin, manager, worker]
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - name: correctionStatus
          in: query
          schema:
            $ref: '#/components/schemas/RequestStatus'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Correction requests inside effective role scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionRequestPage'
    post:
      tags: [Corrections]
      operationId: createCorrectionRequest
      summary: Create Correction Request
      x-bss-roles: [worker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectionRequestWrite'
      responses:
        '201':
          description: Pending correction preserving original values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /correction-requests/{requestId}/approve:
    post:
      tags: [Corrections]
      operationId: approveCorrectionRequest
      summary: Approve Correction Request
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        $ref: '#/components/requestBodies/Decision'
      responses:
        '200':
          description: Atomic correction, updated attendance day and audit reference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionDecisionResult'
        '409':
          $ref: '#/components/responses/Conflict'
  /correction-requests/{requestId}/reject:
    post:
      tags: [Corrections]
      operationId: rejectCorrectionRequest
      summary: Reject Correction Request
      x-bss-roles: [admin, manager]
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        $ref: '#/components/requestBodies/RequiredDecision'
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '200':
          description: Rejected correction; original attendance remains unchanged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionRequest'
  /correction-requests/{requestId}/cancel:
    post:
      tags: [Corrections]

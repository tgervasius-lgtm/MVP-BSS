      type: object
      additionalProperties: false
      required: [activationCode, name, location]
      properties:
        activationCode:
          type: string
          minLength: 8
        name:
          type: string
          maxLength: 120
        location:
          type: string
          maxLength: 160
    TerminalPairResult:
      type: object
      required: [terminal, deviceCredential]
      properties:
        terminal:
          $ref: '#/components/schemas/Terminal'
        deviceCredential:
          type: string
          writeOnly: true
          description: One-time credential; never returned again and never logged.
    TerminalEvent:
      type: object
      additionalProperties: false
      required: [deviceEventId, sequence, occurredAt, eventType, cardUidHash]
      properties:
        deviceEventId:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 1
        occurredAt:
          type: string
          format: date-time
        eventType:
          type: string
          enum: [check_in, check_out]
        cardUidHash:
          type: string
          description: Lowercase hex HMAC-SHA-256 of the normalized RFID UID. The terminal receives the hashing secret through its managed device provisioning channel; the raw UID is never sent or stored.
        deviceClockOffsetSeconds:
          type: integer
    TerminalEventBatch:
      type: object
      additionalProperties: false
      required: [batchId, sentAt, events]
      properties:
        batchId:
          type: string
          format: uuid
        sentAt:
          type: string
          format: date-time
        events:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/TerminalEvent'
    TerminalEventResult:
      type: object
      required: [deviceEventId, status]
      properties:
        deviceEventId:
          type: string
          format: uuid
        status:

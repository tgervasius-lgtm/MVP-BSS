      type: object
      additionalProperties: false
      required: [id, terminalId, deviceEventId, sequence, occurredAt, receivedAt, eventType, status]
      properties:
        id:
          type: string
        terminalId:
          type: string
        deviceEventId:
          type: string
          format: uuid
        sequence:
          type: integer
        workerId:
          type: [string, 'null']
        occurredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
        eventType:
          type: string
          enum: [check_in, check_out]
        status:
          $ref: '#/components/schemas/TerminalEventStatus'
        rejectionCode:
          type: [string, 'null']
    TerminalSyncEventPage:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:

          type: string
        location:
          type: string
        status:
          type: string
          enum: [online, offline, revoked]
        lastSeenAt:
          type: [string, 'null']
          format: date-time
        queueDepth:
          type: integer
          minimum: 0
        clockOffsetSeconds:
          type: integer
        revision:
          $ref: '#/components/schemas/Revision'

<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="color-scheme" content="light dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BSS">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="BSS evidencija radnog vremena, godišnjih odmora i RFID terminala.">
  <title>BSS Smart Systems | Demo 3.0</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="src/adapters/runtime.js"></script>
  <script>
    (()=>{try{const saved=globalThis.BSSCore.runtime.storage.get('bss-theme-v1');const dark=matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.dataset.theme=saved==='dark'||saved==='light'?saved:(dark?'dark':'light');}catch(_){document.documentElement.dataset.theme='light';}})();
  </script>
</head>
<body>
  <div id="root"></div>
  <noscript>Za korištenje BSS aplikacije potrebno je uključiti JavaScript.</noscript>
  <script src="src/domain/contracts.js"></script>
  <script src="src/domain/time.js"></script>
  <script src="src/policies/access.js"></script>
  <script src="app.js"></script>
</body>
</html>

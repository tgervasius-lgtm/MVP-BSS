function loadState(){try{const raw = localStorage.getItem('bss-polished-state-v2');return raw ? JSON.parse(raw) : clone(DEFAULT_STATE);}catch(e){return clone(DEFAULT_STATE);}}
function saveState(){localStorage.setItem('bss-polished-state-v2', JSON.stringify(state));}
function resetState(){localStorage.removeItem('bss-polished-state-v2'); state = clone(DEFAULT_STATE); saveState();}
function now(){return new Date().toLocaleString('hr-HR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'}).replace(',', '.');}
function audit(user, action, module){state.audit.unshift({time:now(), user, action, module}); saveState();}
function toast(msg){const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(window.__toast); window.__toast = setTimeout(()=>t.classList.remove('show'),2200);}
function pill(status){let cls=''; if(['Prisutan','Uredno','Odobreno','Online','Prijavljen','Aktivna','Spremno'].includes(status)) cls='green'; else if(['Na čekanju','Kasni','Aktivno','Offline sync','MVP+'].includes(status)) cls='orange'; else if(['Odbijeno','Odsutna','Greška','Offline'].includes(status)) cls='red'; else if(['CSV/XLSX','Lipanj 2026.'].includes(status)) cls='blue'; return `<span class="pill ${cls}">${status}</span>`;}
function title(title, subtitle, right=''){return `<div class="section-title"><div><h1>${title}</h1><p>${subtitle}</p></div>${right}</div>`;}
function row(avatar, titleText, subtitle, right=''){return `<div class="row"><div class="avatar">${avatar}</div><div class="meta"><b>${titleText}</b><span>${subtitle}</span></div><div class="side">${right}</div></div>`;}
function pendingCount(){return state.requests.filter(x=>x.status==='Na čekanju').length + state.corrections.filter(x=>x.status==='Na čekanju').length;}
function role(){return ROLE_CONFIG[currentRole] || ROLE_CONFIG.admin;}
function currentWorkerName(){return role().user;}
function allowedScreens(){
  const access={
    admin:['home','attendance','mytime','workers','worker','shifts','requests','vacations','corrections','reports','terminal','flow','roles','audit','settings'],
    manager:['home','attendance','workers','worker','shifts','requests','vacations','corrections','reports','terminal','flow'],
    worker:['home','mytime','requests','vacations','corrections'],
    accountant:['home','reports','vacations']
  };
  return access[currentRole] || access.admin;
}
function navigate(next){screen = allowedScreens().includes(next) ? next : 'home'; if(screen!=='worker') workerTab='Profil'; render();}
function switchRole(next){
  if(!ROLE_CONFIG[next]) return;
  currentRole=next;
  vacationDepartment='Svi';
  localStorage.setItem('bss-polished-role',currentRole);
  screen='home';
  closeDrawer();
  render();
  toast(`Prikaz promijenjen: ${role().label}`);
}
function visibleWorkers(){
  if(currentRole==='admin') return state.workers;
  if(currentRole==='manager') return state.workers.filter(w=>role().departments.includes(w.dept));
  if(currentRole==='worker') return state.workers.filter(w=>w.name===currentWorkerName());
  return [];
}
function requestVisible(r){
  if(currentRole==='admin' || currentRole==='accountant') return true;
  if(currentRole==='worker') return r.worker===currentWorkerName();
  const w=state.workers.find(x=>x.name===r.worker);
  return !!w && role().departments.includes(w.dept);
}
function topCopy(){
  const map={
    home:['Početna',role().label+' · '+state.company.name],
    attendance:['RFID/NFC evidencija','Prijava, odjava, greška i offline zapis'],
    mytime:['Moja evidencija','Radni sati, status dana i korekcije'],
    workers:['Radnici','Radnici, smjene i RFID kartice'],
    worker:['Detalj radnika','Profil, evidencija i kartica'],
    requests:['Zahtjevi','Godišnji i slobodni dani'],
    vacations:['Kalendar godišnjih','Godišnji pregled odsutnosti'],
    corrections:['Korekcije vremena','Odobravanje i audit trag'],
    reports:['Izvještaji','CSV export za obračun sati'],
    terminal:['Terminal status','Hardver, sinkronizacija i offline rad'],
    flow:['Kako radi terminal','Jednostavno objašnjenje za kupca'],
    shifts:['Smjene i pravila','Osnovna pravila evidencije'],
    roles:['Prava pristupa','Admin, voditelj, radnik, knjigovođa'],
    audit:['Audit log','Sve važne izmjene na jednom mjestu'],
    settings:['Postavke firme','Osnovna konfiguracija sustava']
  }; return map[screen] || map.home;
}
function navButton(id, ico, text){return `<button class="nav-item ${screen===id?'active':''}" onclick="navigate('${id}')"><span class="ico">${ico}</span>${text}</button>`;}
function drawerItem(id, ico, text){return `<button class="drawer-item ${screen===id?'active':''}" onclick="closeDrawer();navigate('${id}')">${ico} ${text}</button>`;}
function bottomNavigation(){
  const items={
    admin:[['home','⌂','Početna'],['attendance','◴','Evidencija'],['workers','☷','Radnici'],['vacations','▦','Godišnji'],['reports','⇩','Izvještaji']],
    manager:[['home','⌂','Početna'],['workers','☷','Tim'],['vacations','▦','Godišnji'],['requests','□','Zahtjevi'],['reports','⇩','Izvještaji']],
    worker:[['home','⌂','Početna'],['mytime','◷','Moji sati'],['vacations','▦','Godišnji'],['requests','□','Zahtjevi'],['corrections','✎','Korekcije']],
    accountant:[['home','⌂','Početna'],['reports','⇩','Izvještaji'],['vacations','▦','Godišnji']]
  }[currentRole] || [];
  return `<div class="bottom-nav" style="grid-template-columns:repeat(${items.length},1fr)">${items.map(x=>navButton(...x)).join('')}</div>`;
}
function drawerNavigation(){
  const items={
    admin:[['home','⌂','Početna'],['attendance','◴','RFID/NFC evidencija'],['mytime','◷','Moja evidencija'],['workers','☷','Radnici i kartice'],['shifts','↺','Smjene i pravila'],['vacations','▦','Kalendar godišnjih'],['requests','□','Zahtjevi za godišnji'],['corrections','✎','Korekcije vremena'],['reports','⇩','Izvještaji CSV/XLSX'],['terminal','◉','Terminal status'],['flow','→','Kako radi terminal'],['roles','♙','Prava pristupa'],['audit','☰','Audit log'],['settings','⚙','Postavke firme']],
    manager:[['home','⌂','Početna'],['attendance','◴','RFID/NFC evidencija'],['workers','☷','Radnici mog tima'],['shifts','↺','Smjene i pravila'],['vacations','▦','Kalendar mog tima'],['requests','□','Zahtjevi mog tima'],['corrections','✎','Korekcije mog tima'],['reports','⇩','Izvještaji'],['terminal','◉','Terminal status'],['flow','→','Kako radi terminal']],
    worker:[['home','⌂','Početna'],['mytime','◷','Moja evidencija'],['vacations','▦','Moj godišnji kalendar'],['requests','□','Moji zahtjevi'],['corrections','✎','Moje korekcije']],
    accountant:[['home','⌂','Početna'],['reports','⇩','Izvještaji CSV/XLSX'],['vacations','▦','Kalendar odsutnosti']]
  }[currentRole] || [];
  return items.map(x=>drawerItem(...x)).join('');
}
function shell(){const [head, sub] = topCopy(); return `

      ${bottomNavigation()}
      <div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closeDrawer()">
        <div class="drawer-panel">
          <div class="modal-head"><b>BSS izbornik</b><button class="close-btn" onclick="closeDrawer()">×</button></div>
          <div class="role-panel"><label>Prikaži aplikaciju kao</label><select onchange="switchRole(this.value)"><option value="admin" ${currentRole==='admin'?'selected':''}>Administrator</option><option value="manager" ${currentRole==='manager'?'selected':''}>Voditelj</option><option value="worker" ${currentRole==='worker'?'selected':''}>Radnik</option><option value="accountant" ${currentRole==='accountant'?'selected':''}>Knjigovođa</option></select></div>

function render(){
  if(!allowedScreens().includes(screen)) screen='home';
  document.getElementById('root').innerHTML = shell();
  if(!logged) return;
  const views={home:viewHome,attendance:viewAttendance,mytime:viewMyTime,workers:viewWorkers,requests:viewRequests,vacations:viewVacations,corrections:viewCorrections,reports:viewReports,terminal:viewTerminal,flow:viewFlow,shifts:viewShifts,roles:viewRoles,audit:viewAudit,settings:viewSettings,worker:viewWorker};
  $('#content').innerHTML = `<div class="screen">${(views[screen]||viewHome)()}</div>`;
}
function login(){currentRole=$('#loginRole').value;localStorage.setItem('bss-polished-role',currentRole);logged=true;localStorage.setItem('bss-polished-logged','1');screen='home';render();toast(`Dobrodošli. Aktivni prikaz: ${role().label}.`);}
function logout(){logged=false;localStorage.removeItem('bss-polished-logged');screen='home';render();}
function openDrawer(){$('#drawer').classList.add('open');}
function closeDrawer(){$('#drawer').classList.remove('open');}
function saveAndRender(msg){saveState(); render(); if(msg) toast(msg);}

function viewHome(){
  if(currentRole==='worker') return viewWorkerHome();
  if(currentRole==='manager') return viewManagerHome();
  if(currentRole==='accountant') return viewAccountantHome();
  const present = state.workers.filter(w=>w.status==='Prisutan').length;
  const late = state.workers.filter(w=>w.status==='Kasni').length;
  return `
  ${title('Danas u firmi','Pregled radnog vremena bez ručnog Excela.', pill(state.terminal.online?'Online':'Offline'))}
  <div class="card hero"><h2 style="margin:0;font-size:22px">Evidencija spremna za obračun</h2><p style="margin:10px 0 0;font-size:13px;line-height:1.55">Radnici se prijavljuju karticom, voditelj prati stanje u realnom vremenu, a na kraju mjeseca izvoz ide u CSV/XLSX format za knjigovodstvo.</p><div class="meta-line"><span>Ovaj mjesec evidentirano</span><b>3.842 h</b></div><div class="meta-line"><span>Status</span><b>Spremno za export</b></div></div>
  <div class="grid-2">
    <div class="stat"><div class="num">${state.workers.length}</div><div class="lab">Ukupno radnika</div><div class="trend">Dodavanje novih radnika radi</div></div>
    <div class="stat"><div class="num">${present}</div><div class="lab">Trenutno prisutno</div><div class="trend">Terminal sinkroniziran</div></div>
    <div class="stat"><div class="num">${late}</div><div class="lab">Kašnjenja danas</div><div class="trend" style="color:var(--amber)">Potrebna provjera voditelja</div></div>
    <div class="stat"><div class="num">${pendingCount()}</div><div class="lab">Stavke na čekanju</div><div class="trend" style="color:var(--amber)">Godišnji i korekcije</div></div>
  </div>
  <div class="card"><h2>Brze akcije</h2><div class="quick">
    <button onclick="navigate('attendance')"><b>RFID prijava</b><span>Simuliraj dolazak, odjavu ili grešku kartice</span></button>
    <button onclick="downloadCSV()"><b>Preuzmi CSV</b><span>Izvještaj za knjigovodstvo i obračun sati</span></button>
    <button onclick="openWorkerModal()"><b>Dodaj radnika</b><span>Otvara modal i sprema radnika u listu</span></button>
    <button onclick="navigate('terminal')"><b>Offline test</b><span>Provjeri lokalno spremanje zapisa</span></button>
  </div></div>
  <div class="card"><h2>Zadnje aktivnosti</h2>${state.audit.slice(0,4).map(a=>row((a.user[0]||'S'),a.action,`${a.time} · ${a.user} · ${a.module}`)).join('')}</div>
  <div class="card"><div class="summary-line"><span>Terminal</span><b>BSS Terminal 01 · ${state.terminal.online?'Online':'Offline'}</b></div><div class="summary-line"><span>Zadnja sinkronizacija</span><b>${state.terminal.lastSync}</b></div><div class="summary-line"><span>Neposlani zapisi</span><b>${state.terminal.unsynced}</b></div></div>`;
}
function viewWorkerHome(){
  const w=state.workers.find(x=>x.name===currentWorkerName()) || state.workers[0];
  const ownRequests=state.requests.filter(r=>r.worker===w.name);
  const approved=ownRequests.filter(r=>r.status==='Odobreno').length;
  const pending=ownRequests.filter(r=>r.status==='Na čekanju').length;
  return `${title(`Pozdrav, ${w.name.split(' ')[0]}`,'Tvoj osobni pregled. Podaci drugih radnika nisu dostupni.',pill(w.status))}
  <div class="card hero"><h2 style="margin:0;font-size:22px">${w.status==='Prisutan'?'Trenutačno si prijavljen':'Trenutačno nisi prijavljen'}</h2><p style="margin:10px 0 0">Današnja smjena: ${w.shift} · zadnja prijava ${w.today}</p><div class="meta-line"><span>Danas evidentirano</span><b>6:18 h</b></div><div class="meta-line"><span>Planirana smjena</span><b>06:00 – 14:00</b></div></div>
  <div class="grid-2"><div class="stat"><div class="num">168:45</div><div class="lab">Sati ovaj mjesec</div><div class="trend">Osobni podaci</div></div><div class="stat"><div class="num">18</div><div class="lab">Preostali dani</div><div class="trend">Godišnji odmor</div></div><div class="stat"><div class="num">${approved}</div><div class="lab">Odobreni zahtjevi</div></div><div class="stat"><div class="num">${pending}</div><div class="lab">Zahtjevi na čekanju</div></div></div>
  <div class="card"><h2>Brze akcije</h2><div class="quick"><button onclick="navigate('mytime')"><b>Moji sati</b><span>Pregledaj svoje dolaske, odlaske i ukupne sate</span></button><button onclick="navigate('vacations')"><b>Moj godišnji</b><span>Cijela godina prikazana u osobnom kalendaru</span></button><button onclick="navigate('requests')"><b>Novi zahtjev</b><span>Zatraži godišnji ili slobodan dan</span></button><button onclick="navigate('corrections')"><b>Korekcija</b><span>Prati zahtjeve za ispravak vremena</span></button></div></div>
  ${recordsTable(w.name)}`;
}
function viewManagerHome(){
  const team=visibleWorkers();
  const present=team.filter(w=>w.status==='Prisutan').length;
  const pending=state.requests.filter(r=>requestVisible(r)&&r.status==='Na čekanju').length;
  return `${title('Pregled mog tima','Voditelj vidi samo odjele Sklapanje i Proizvodnja.',pill(`${team.length} radnika`))}<div class="grid-2"><div class="stat"><div class="num">${present}</div><div class="lab">Prisutni u timu</div></div><div class="stat"><div class="num">${team.filter(w=>w.status==='Kasni').length}</div><div class="lab">Kašnjenja</div></div><div class="stat"><div class="num">${pending}</div><div class="lab">Zahtjevi na čekanju</div></div><div class="stat"><div class="num">${state.corrections.filter(c=>c.status==='Na čekanju'&&requestVisible({worker:c.worker})).length}</div><div class="lab">Korekcije</div></div></div><div class="card"><h2>Radnici mog tima</h2>${team.map(w=>row(w.avatar,w.name,`${w.dept} · ${w.shift}`,pill(w.status))).join('')}</div><div class="card"><h2>Brze akcije</h2><div class="quick"><button onclick="navigate('vacations')"><b>Kalendar tima</b><span>Godišnji odmori mojih odjela</span></button><button onclick="navigate('requests')"><b>Odobri zahtjeve</b><span>${pending} zahtjeva čeka odluku</span></button></div></div>`;
}
function viewAccountantHome(){
  return `${title('Pregled za knjigovodstvo','Pristup izvještajima bez administrativnih ovlasti.',pill('Samo čitanje'))}<div class="card hero"><h2 style="margin:0;font-size:22px">Obračunski podaci su spremni</h2><p style="margin:10px 0 0">Knjigovođa može generirati i preuzeti izvještaje, ali ne može mijenjati radnike, smjene ili evidenciju.</p><div class="meta-line"><span>Aktivni radnici</span><b>${state.workers.length}</b></div><div class="meta-line"><span>Posljednji export</span><b>${state.lastReport}</b></div></div><div class="card"><h2>Brze akcije</h2><div class="quick"><button onclick="navigate('reports')"><b>Izvještaji</b><span>CSV/XLSX za obračun sati</span></button><button onclick="navigate('vacations')"><b>Odsutnosti</b><span>Pregled odobrenih godišnjih odmora</span></button></div></div>`;
}
function viewAttendance(){const l=state.lastScan;return `
  ${title('RFID/NFC evidencija','Prikaz prijave, odjave, nepoznate kartice i offline rada.')}
  <div class="card rfid-box"><span class="pill ${state.terminal.online?'green':'red'}">${state.terminal.online?'Terminal online':'Terminal offline'} · Ulaz proizvodnje</span><div class="rfid-ring"><div class="rfid-card">≋</div></div><h2 style="margin:0;font-size:21px">Prislonite RFID karticu</h2><p class="small-muted" style="max-width:300px;text-align:center">Terminal daje zvučnu potvrdu i šalje zapis u aplikaciju. Ako internet padne, zapis se sprema lokalno i sinkronizira kasnije.</p><div class="result"><div class="summary-line"><span>Radnik / kartica</span><b>${l.name}</b></div><div class="summary-line"><span>Status</span><b>${pill(l.status)}</b></div><div class="summary-line"><span>Vrijeme</span><b>${l.time}</b></div><div class="summary-line"><span>Poruka</span><b>${l.message}</b></div></div><div class="btns"><button class="btn" onclick="scanToggle()">Simuliraj očitanje</button><button class="btn secondary" onclick="unknownCard()">Nepoznata kartica</button><button class="btn secondary" onclick="offlineScan()">Offline prijava</button></div></div>
  <div class="card"><h2>Realne situacije</h2><div class="summary-line"><span>Zaboravljena odjava</span><b>Korekcija s odobrenjem</b></div><div class="summary-line"><span>Izgubljena kartica</span><b>Blokiranje i zamjena</b></div><div class="summary-line"><span>Nema interneta</span><b>Lokalno spremanje zapisa</b></div><div class="summary-line"><span>Nepoznata kartica</span><b>Odbijanje + audit zapis</b></div></div>`;}
function scanToggle(){const worker = state.workers.find(w=>w.name==='Marko Marić'); const out = worker.status==='Prisutan'; const time = new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}); worker.status = out ? 'Odsutna' : 'Prisutan'; worker.today = out ? '—' : time; state.terminal.scans += 1; state.lastScan = {name:worker.name,status:out?'Odjavljen':'Prijavljen',time,terminal:'BSS Terminal 01',message:out?'Odjava prihvaćena. Ukupno danas: 8:14 h':'Prijava prihvaćena.'}; audit('Sustav', `${worker.name}: ${state.lastScan.status.toLowerCase()} karticom.`, 'Terminal'); saveAndRender(`${worker.name}: ${state.lastScan.status}`);}
function unknownCard(){state.lastScan={name:'UID 04 A7 91 2B',status:'Greška',time:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),terminal:'BSS Terminal 01',message:'Kartica nije dodijeljena radniku.'}; audit('Sustav','Odbijena nepoznata RFID kartica 04 A7 91 2B.','Terminal'); saveAndRender('Nepoznata kartica odbijena.');}
function offlineScan(){state.terminal.online=false; state.terminal.unsynced += 1; state.lastScan={name:'Ivan Horvat',status:'Offline sync',time:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),terminal:'BSS Terminal 01',message:'Zapis spremljen lokalno.'}; audit('Terminal','Offline prijava spremljena lokalno.','Terminal'); saveAndRender('Zapis je spremljen lokalno.');}

function viewMyTime(){const worker=currentWorkerName();return `${title('Moja evidencija',`Pregled radnog vremena za ${worker}.`,pill('Srpanj 2026.'))}<div class="card"><div class="grid-2"><div class="stat"><div class="num">168:45</div><div class="lab">Ukupno sati</div></div><div class="stat"><div class="num">6:45</div><div class="lab">Prekovremeno</div></div></div></div>${recordsTable(worker)}<div class="card"><h2>Zahtjev za korekciju</h2><div class="form"><label>Datum<input id="corrDate" value="08.07.2026."></label><label>Razlog<textarea id="corrReason" rows="3">Zaboravljena odjava nakon završetka smjene.</textarea></label><button class="btn block" onclick="addCorrection()">Pošalji zahtjev</button></div></div>`;}
function recordVisible(r){if(currentRole==='worker')return r.worker===currentWorkerName();if(currentRole==='manager'){const w=state.workers.find(x=>x.name===r.worker);return !!w&&role().departments.includes(w.dept);}return true;}
function recordsTable(worker=''){const limitedWorker=worker||(currentRole==='worker'?currentWorkerName():'');const rows=(limitedWorker?state.records.filter(r=>r.worker===limitedWorker):state.records).filter(recordVisible); return `<div class="card table-wrap"><table><thead><tr><th>Radnik</th><th>Datum</th><th>Dolazak</th><th>Odlazak</th><th>Ukupno</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.worker}</td><td>${r.date}<br>${pill(r.status)}</td><td>${r.start}</td><td>${r.end}</td><td>${r.total}</td></tr>`).join('')||'<tr><td colspan="5">Nema zapisa za odabrani period.</td></tr>'}</tbody></table></div>`;}
function addCorrection(){const date=$('#corrDate').value.trim(), reason=$('#corrReason').value.trim(); state.corrections.unshift({id:Date.now(),worker:currentWorkerName(),date,oldValue:'Odjava: —',newValue:'Odjava: 16:02',reason,status:'Na čekanju'}); audit(currentRole==='worker'?'Radnik':role().label,'Poslan zahtjev za korekciju vremena.','Korekcije'); saveAndRender('Zahtjev za korekciju poslan voditelju.'); navigate('corrections');}

function viewRequests(){
  const requests=state.requests.filter(requestVisible);
  const isWorker=currentRole==='worker';
  const isApprover=['admin','manager'].includes(currentRole);
  const pending=requests.filter(r=>r.status==='Na čekanju').length;
  const requestForm=isWorker?`<div class="card"><h2>Novi zahtjev</h2><div class="form"><label>Vrsta<select id="vacType"><option>Godišnji odmor</option><option>Slobodan dan</option></select></label><label>Od<input id="vacStart" type="date" value="2026-08-17"></label><label>Do<input id="vacEnd" type="date" value="2026-08-21"></label><label>Napomena<textarea id="vacNote" rows="3">Planirani godišnji odmor.</textarea></label><button class="btn block" onclick="submitVacationRequest()">Pošalji zahtjev</button></div></div>`:'';
  return `${title(isWorker?'Moji zahtjevi':currentRole==='manager'?'Zahtjevi mog tima':'Zahtjevi za godišnji',isWorker?'Radnik vidi i šalje samo vlastite zahtjeve.':'Odobravanje godišnjih i slobodnih dana.',pill(`${pending} na čekanju`))}<div class="card">${requests.map(r=>`<div class="row"><div class="meta"><b>${r.worker}</b><span>${r.type} · ${r.period} · ${r.days}<br>${r.note}</span></div><div class="side">${pill(r.status)}${isApprover&&r.status==='Na čekanju'?`<div class="btns"><button class="btn green" onclick="updateRequest(${r.id},'Odobreno')">Odobri</button><button class="btn red" onclick="updateRequest(${r.id},'Odbijeno')">Odbij</button></div>`:''}</div></div>`).join('')||'<p class="small-muted">Nema zahtjeva.</p>'}</div>${requestForm}<button class="btn secondary block" onclick="navigate('vacations')">Otvori godišnji kalendar</button>`;
}
function dateLabel(iso){return new Date(`${iso}T12:00:00`).toLocaleDateString('hr-HR',{day:'2-digit',month:'2-digit'}).replace(/\.$/,'');}
function dayCount(start,end){return Math.max(1,Math.round((new Date(`${end}T12:00:00`)-new Date(`${start}T12:00:00`))/86400000)+1);}
function submitVacationRequest(){
  const type=$('#vacType').value,start=$('#vacStart').value,end=$('#vacEnd').value,note=$('#vacNote').value.trim();
  if(!start||!end||end<start){toast('Provjeri početni i završni datum.');return;}
  const count=dayCount(start,end);
  state.requests.unshift({id:Date.now(),worker:currentWorkerName(),type,start,end,period:start===end?dateLabel(start):`${dateLabel(start)} – ${dateLabel(end)}`,days:`${count} ${count===1?'dan':'dana'}`,note:note||'Bez napomene',status:'Na čekanju'});
  audit('Radnik',`Poslan zahtjev za ${type.toLowerCase()}: ${dateLabel(start)} – ${dateLabel(end)}.`,'Zahtjevi');
  saveAndRender('Zahtjev je poslan voditelju.');
}
function updateRequest(id,status){if(!['admin','manager'].includes(currentRole)) return;const r=state.requests.find(x=>x.id===id); if(!r||!requestVisible(r)) return; r.status=status; audit(role().label,`${status} zahtjev: ${r.worker} · ${r.period}.`,'Zahtjevi'); saveAndRender(`Zahtjev: ${status}`);}

function calendarRequests(){
  return state.requests.filter(r=>r.start&&r.end&&r.status!=='Odbijeno'&&requestVisible(r))
    .filter(r=>currentRole!=='accountant'||r.status==='Odobreno')
    .filter(r=>vacationDepartment==='Svi'||(state.workers.find(w=>w.name===r.worker)||{}).dept===vacationDepartment);
}
function isoDate(year,month,day){return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}
function calendarMonth(month,requests){
  const first=new Date(calendarYear,month,1),count=new Date(calendarYear,month+1,0).getDate(),offset=(first.getDay()+6)%7;
  const monthName=first.toLocaleDateString('hr-HR',{month:'long'});
  const today=new Date();
  let cells=Array.from({length:offset},()=>'<span class="day empty"></span>').join('');
  for(let day=1;day<=count;day++){
    const iso=isoDate(calendarYear,month,day),events=requests.filter(r=>r.start<=iso&&r.end>=iso);
    const statuses=[...new Set(events.map(r=>r.status))];
    const statusClass=!events.length?'':statuses.length>1?'has-mixed':statuses[0]==='Odobreno'?'has-approved':'has-pending';
    const isToday=today.getFullYear()===calendarYear&&today.getMonth()===month&&today.getDate()===day;
    const names=events.map(r=>`${r.worker} – ${r.status}`).join(', ');
    cells+=`<button class="day ${statusClass} ${isToday?'today':''}" ${events.length?`onclick="showVacationDay('${iso}')" title="${names}"`:''}>${day}${events.length>1?`<span class="event-count">${events.length}</span>`:''}</button>`;
  }
  return `<div class="month-card"><h3>${monthName}</h3><div class="week-row">${['P','U','S','Č','P','S','N'].map(d=>`<span>${d}</span>`).join('')}</div><div class="day-grid">${cells}</div></div>`;
}
function changeCalendarYear(delta){calendarYear+=delta;render();}
function showVacationDay(iso){
  const events=calendarRequests().filter(r=>r.start<=iso&&r.end>=iso);
  if(!events.length) return;
  const modal=$('#modal');
  modal.innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2 style="margin:0">${new Date(`${iso}T12:00:00`).toLocaleDateString('hr-HR',{day:'numeric',month:'long',year:'numeric'})}</h2><p class="small-muted" style="margin:4px 0 0">Odsutnosti za odabrani dan</p></div><button class="close-btn" onclick="closeModal()">×</button></div>${events.map(r=>row((r.worker.split(' ').map(x=>x[0]).join('').slice(0,2)),r.worker,`${r.type} · ${r.period}`,pill(r.status))).join('')}</div>`;
  modal.classList.add('open');
}
function viewVacations(){
  const requests=calendarRequests();
  const inYear=requests.filter(r=>r.start.slice(0,4)<=String(calendarYear)&&r.end.slice(0,4)>=String(calendarYear));
  const departments=['Svi',...new Set(visibleWorkers().map(w=>w.dept))];
  const canFilter=currentRole==='admin';
  const titleText=currentRole==='worker'?'Moj godišnji kalendar':currentRole==='manager'?'Kalendar mog tima':currentRole==='accountant'?'Kalendar odsutnosti':'Kalendar godišnjih – cijela firma';
  const subtitle=currentRole==='worker'?'Prikazuju se isključivo tvoji odobreni i poslani zahtjevi.':currentRole==='admin'?'Administrator vidi godišnje odmore svih radnika kroz cijelu godinu.':'Prikaz je ograničen pravima tvoje uloge.';
  return `${title(titleText,subtitle,pill(String(calendarYear)))}
  <div class="card"><div class="calendar-toolbar"><div class="year-switch"><button onclick="changeCalendarYear(-1)" aria-label="Prethodna godina">‹</button><b>${calendarYear}</b><button onclick="changeCalendarYear(1)" aria-label="Sljedeća godina">›</button></div>${canFilter?`<select class="calendar-filter" onchange="vacationDepartment=this.value;render()">${departments.map(d=>`<option ${vacationDepartment===d?'selected':''}>${d}</option>`).join('')}</select>`:''}</div></div>
  <div class="grid-2"><div class="stat"><div class="num">${inYear.length}</div><div class="lab">Periodi odsutnosti</div></div><div class="stat"><div class="num">${new Set(inYear.map(r=>r.worker)).size}</div><div class="lab">Radnici u kalendaru</div></div></div>
  <div class="card"><div class="year-calendar">${Array.from({length:12},(_,m)=>calendarMonth(m,inYear)).join('')}</div><div class="calendar-legend"><span><i class="legend-dot approved"></i>Odobreno</span><span><i class="legend-dot pending"></i>Na čekanju</span><span><i class="legend-dot mixed"></i>Više radnika/statusa</span></div><p class="small-muted">Dodirni označeni datum kako bi vidio detalje.</p></div>
  <div class="card"><h2>${currentRole==='worker'?'Moji periodi':'Planirani godišnji odmori'}</h2>${inYear.sort((a,b)=>a.start.localeCompare(b.start)).map(r=>row(r.worker.split(' ').map(x=>x[0]).join('').slice(0,2),r.worker,`${r.type} · ${r.period} · ${r.days}`,pill(r.status))).join('')||'<p class="small-muted">Nema evidentiranih godišnjih odmora za odabranu godinu.</p>'}</div>
  ${currentRole==='worker'?'<button class="btn block" onclick="navigate(\'requests\')">Pošalji novi zahtjev</button>':''}`;
}

function viewCorrections(){const isWorker=currentRole==='worker';const isApprover=['admin','manager'].includes(currentRole);const corrections=state.corrections.filter(c=>requestVisible({worker:c.worker}));return `${title(isWorker?'Moje korekcije':currentRole==='manager'?'Korekcije mog tima':'Korekcije vremena',isWorker?'Vidiš samo vlastite zahtjeve za ispravak vremena.':'Svaka ručna izmjena ima razlog i audit zapis.')}<div class="card">${corrections.map(c=>`<div class="row"><div class="meta"><b>${c.worker}</b><span>${c.date} · ${c.oldValue} → ${c.newValue}<br>${c.reason}</span></div><div class="side">${pill(c.status)}${isApprover&&c.status==='Na čekanju'?`<div class="btns"><button class="btn green" onclick="updateCorrection(${c.id},'Odobreno')">Odobri</button><button class="btn red" onclick="updateCorrection(${c.id},'Odbijeno')">Odbij</button></div>`:''}</div></div>`).join('')||'<p class="small-muted">Nema zahtjeva za korekciju.</p>'}</div><div class="card hero"><h2 style="margin:0">Kontrolirana korekcija vremena</h2><p style="margin:10px 0 0">Stara vrijednost, nova vrijednost, korisnik, razlog i vrijeme izmjene ostaju u audit logu. Radnik ne može sam promijeniti evidenciju.</p></div>`;}
function updateCorrection(id,status){if(!['admin','manager'].includes(currentRole)) return;const c=state.corrections.find(x=>x.id===id); if(!c||!requestVisible({worker:c.worker})) return; c.status=status; audit(role().label,`${status} korekcija za ${c.worker}: ${c.oldValue} → ${c.newValue}.`,'Korekcije'); saveAndRender(`Korekcija: ${status}`);}

function viewReports(){return `${title('Izvještaji','Export za knjigovodstvo i obračun sati.',pill('CSV/XLSX'))}<div class="card"><div class="form"><label>Period<select><option>01.06.2026. – 30.06.2026.</option><option>01.07.2026. – 31.07.2026.</option></select></label><label>Radnici<select><option>Svi aktivni radnici</option><option>Samo proizvodnja</option><option>Jedan radnik</option></select></label><label>Vrsta izvještaja<select><option>Mjesečna evidencija radnog vremena</option><option>Kašnjenja i nepotpuni dani</option><option>Godišnji i odsutnosti</option><option>Korekcije vremena</option></select></label><button class="btn block" onclick="generateReport()">Generiraj izvještaj</button></div></div><div class="card"><h2>Export za obračun plaće</h2><div class="summary-line"><span>Format</span><b>CSV radi odmah · XLSX je sljedeći korak</b></div><div class="summary-line"><span>Sadržaj</span><b>Dolasci, odlasci, pauza i ukupni sati</b></div><div class="summary-line"><span>Status</span><b>${state.lastReport || 'Spremno za generiranje'}</b></div><div class="btns"><button class="btn" onclick="downloadCSV()">Preuzmi CSV</button><button class="btn secondary" onclick="toast('XLSX je planiran za sljedeći razvojni korak.')">Preuzmi XLSX</button></div></div>${recordsTable()}`;}
function generateReport(){state.lastReport = `Generirano ${now()}`; audit('Admin','Generiran mjesečni izvještaj radnog vremena.','Izvještaji'); saveAndRender('Izvještaj generiran.');}
function downloadCSV(){const head=['Radnik','Datum','Dolazak','Odlazak','Pauza','Ukupno','Status']; const rows=state.records.filter(recordVisible).map(r=>[r.worker,r.date,r.start,r.end,r.pause,r.total,r.status]); const csv=[head,...rows].map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='BSS_evidencija_radnog_vremena_06_2026.csv'; a.click(); URL.revokeObjectURL(a.href); state.lastReport = `CSV preuzet ${now()}`; audit(role().label,'Preuzet CSV izvještaj za obračun sati.','Izvještaji'); saveState(); toast('CSV izvještaj preuzet.'); render();}

function openWorkerModal(){const modal=$('#modal'); modal.innerHTML=`<div class="modal-card"><div class="modal-head"><h2 style="margin:0">Dodaj radnika</h2><button class="close-btn" onclick="closeModal()">×</button></div><div class="form"><label>Ime i prezime<input id="newName" value="Luka Babić"></label><label>Odjel<select id="newDept"><option>Proizvodnja</option><option>Sklapanje</option><option>Ured</option><option>Prodaja</option><option>Održavanje</option></select></label><label>Radno mjesto<input id="newRole" value="Operater"></label><label>Smjena<select id="newShift"><option>Jutarnja</option><option>Popodnevna</option><option>Noćna</option><option>Fleksibilna</option></select></label><label>RFID UID<input id="newCard" value="04 88 21 AB"></label><button class="btn block" onclick="addWorker()">Spremi radnika</button></div></div>`; modal.classList.add('open');}
function closeModal(){$('#modal').classList.remove('open');}
function addWorker(){const name=$('#newName').value.trim(); if(!name){toast('Unesi ime radnika.'); return;} const avatar=name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase(); state.workers.push({id:Date.now(),name,dept:$('#newDept').value,role:$('#newRole').value.trim(),shift:$('#newShift').value,status:'Odsutna',card:$('#newCard').value.trim(),today:'—',avatar}); audit('Admin',`Dodan radnik ${name} i dodijeljena RFID kartica.`, 'Radnici'); closeModal(); saveAndRender('Radnik dodan u listu.'); navigate('workers');}
function closeAllModals(){closeModal(); closeDrawer();}
function resetDemo(){resetState(); logged=true; localStorage.setItem('bss-polished-logged','1'); closeAllModals(); render(); toast('Demo podaci su vraćeni na početno stanje.');}

render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>

<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BSS Demo">
  <title>BSS Smart Systems | Polished MVP+ Demo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    :root{
      --bg:#f4fbf7;
      --bg-2:#edf8f2;
      --surface:#ffffff;
      --surface-2:#f8fcf9;
      --line:#d8e7df;
      --text:#123026;
      --muted:#5f7f72;
      --teal:#0f766e;
      --teal-2:#0f5c56;
      --green:#22c55e;
      --green-2:#16a34a;
      --green-soft:#dcfce7;
      --amber:#d97706;
      --amber-soft:#fff4d6;
      --red:#dc2626;
      --red-soft:#fee2e2;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --safe:env(safe-area-inset-bottom);
      --safe-top:env(safe-area-inset-top);
      --shadow:0 16px 36px rgba(18,48,38,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#effcf4 0,#f4fbf7 50%,#e7f6ec 100%);color:var(--text)}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0;-webkit-tap-highlight-color:transparent}
    #root{min-height:100%;display:flex;justify-content:center}
    .device{width:min(430px,100%);height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
    @media(min-width:760px){#root{align-items:center;padding:18px}.device{height:min(930px,calc(100dvh - 36px));border-radius:34px;box-shadow:0 24px 64px rgba(18,48,38,.18);border:1px solid rgba(255,255,255,.8)}}
    .hidden{display:none!important}
    .login{min-height:100%;padding:calc(54px + var(--safe-top)) 24px calc(24px + var(--safe));display:flex;flex-direction:column;position:relative;overflow:auto;background:linear-gradient(155deg,#0f766e 0%,#15906f 50%,#4ade80 100%);color:#fff}
    .login:before,.login:after{content:"";position:absolute;border-radius:50%;pointer-events:none}
    .login:before{width:380px;height:380px;background:rgba(255,255,255,.08);right:-220px;top:-120px}
    .login:after{width:300px;height:300px;background:rgba(255,255,255,.08);left:-180px;bottom:-100px}
    .login > *{position:relative;z-index:1}
    .brand{text-align:center;margin-bottom:28px}
    .mark{width:86px;height:86px;margin:0 auto;border-radius:28px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);display:grid;place-items:center;font-size:38px;font-weight:900;backdrop-filter:blur(10px)}
    .brand h1{font-size:42px;line-height:1;margin:18px 0 8px;font-weight:950;letter-spacing:-.05em}
    .brand small{letter-spacing:.32em;text-transform:uppercase;font-size:12px;font-weight:800;color:rgba(255,255,255,.8)}
    .brand p{margin:14px auto 0;max-width:320px;line-height:1.5;color:rgba(255,255,255,.85);font-size:14px}
    .glass{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);border-radius:24px;padding:18px}
    .field{display:grid;gap:8px;margin-bottom:14px}
    .field label{font-size:13px;font-weight:800;color:rgba(255,255,255,.88)}
    .field input{width:100%;border-radius:18px;border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.16);color:#fff;padding:15px 16px;outline:none}
    .field input::placeholder{color:rgba(255,255,255,.7)}
    .login-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;color:rgba(255,255,255,.86);margin:8px 0 20px}
    .primary{width:100%;border-radius:18px;padding:16px 18px;background:#ffffff;color:var(--teal);font-weight:900;letter-spacing:.02em;box-shadow:0 14px 30px rgba(12,61,45,.22)}
    .login-note{margin-top:auto;text-align:center;font-size:12px;color:rgba(255,255,255,.82);line-height:1.45;padding-top:16px}

    .app-shell{height:100%;display:flex;flex-direction:column;min-height:0}
    .topbar{padding:calc(14px + var(--safe-top)) 16px 14px;background:linear-gradient(135deg,#0f766e,#158a74 56%,#22c55e);color:#fff;display:flex;align-items:center;gap:12px;box-shadow:0 10px 24px rgba(15,118,110,.18);z-index:3}
    .mini-logo{width:44px;height:44px;border-radius:16px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-weight:950;font-size:22px;border:1px solid rgba(255,255,255,.18)}
    .top-copy{flex:1;min-width:0}.top-copy h2{margin:0;font-size:17px;line-height:1.15;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-copy p{margin:3px 0 0;font-size:12px;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .menu-btn{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.16);color:#fff;font-size:21px;font-weight:900}
    .content{flex:1;min-height:0;overflow-y:auto;padding:18px 16px calc(110px + var(--safe));scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    .content::-webkit-scrollbar{width:0;height:0}
    .screen{animation:fade .18s ease}
    @keyframes fade{from{opacity:.55;transform:translateY(10px)}to{opacity:1;transform:none}}
    .section-title{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin:0 0 14px}.section-title h1{margin:0;font-size:27px;line-height:1.06;letter-spacing:-.05em}.section-title p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:8px 10px;font-size:11px;font-weight:900;border:1px solid #cde5d6;background:#f4fbf7;color:var(--teal);white-space:nowrap}
    .pill.green{background:var(--green-soft);border-color:#bbf7d0;color:var(--green-2)}.pill.orange{background:var(--amber-soft);border-color:#fcd34d;color:var(--amber)}.pill.red{background:var(--red-soft);border-color:#fecaca;color:var(--red)}.pill.blue{background:var(--blue-soft);border-color:#bfdbfe;color:var(--blue)}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
    .card.hero{background:linear-gradient(135deg,#0f766e 0%,#15906f 56%,#4ade80 100%);color:#fff;border:0}
    .card.hero p{color:rgba(255,255,255,.92)}
    .card.hero .meta-line{border-top-color:rgba(255,255,255,.18)}
    .card h2{margin:0 0 10px;font-size:18px;letter-spacing:-.02em}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .stat{background:var(--surface-2);border:1px solid var(--line);border-radius:18px;padding:14px;min-height:92px}
    .stat .num{font-size:26px;font-weight:950;letter-spacing:-.05em}.stat .lab{margin-top:4px;font-size:12px;color:var(--muted);font-weight:750}.stat .trend{margin-top:9px;font-size:11px;font-weight:850;color:var(--green-2);line-height:1.35}
    .quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick button{min-height:78px;border-radius:18px;border:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fcf9);padding:12px;text-align:left;color:var(--text)}.quick b{display:block;font-size:13px}.quick span{display:block;font-size:11px;line-height:1.35;color:var(--muted);margin-top:5px}
    .row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #edf3ef}.row:last-child{border-bottom:0}
    .avatar{width:40px;height:40px;border-radius:15px;background:linear-gradient(135deg,#d1fae5,#ecfeff);display:grid;place-items:center;font-weight:900;color:var(--teal);flex:0 0 auto}
    .meta{flex:1;min-width:0}.meta b{display:block;font-size:14px;line-height:1.25}.meta span{display:block;font-size:12px;line-height:1.4;color:var(--muted);margin-top:4px}
    .side{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .summary-line,.meta-line{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid #edf3ef;font-size:13px}.summary-line:last-child,.meta-line:last-child{border-bottom:0}.summary-line span,.meta-line span{color:var(--muted)} .summary-line b,.meta-line b{text-align:right}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border-radius:16px;padding:13px 15px;font-weight:900;color:#fff;background:var(--teal);box-shadow:0 10px 26px rgba(15,118,110,.16)}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.green{background:var(--green-2)}.btn.red{background:var(--red)}.btn.block{width:100%}
    .form{display:grid;gap:11px}.form label{display:grid;gap:6px;font-size:12px;font-weight:800;color:var(--muted)}.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;outline:none;color:var(--text)}
    .table-wrap{overflow-x:auto}.table-wrap table{width:100%;border-collapse:collapse;min-width:420px}.table-wrap th{text-align:left;padding:9px 6px;border-bottom:1px solid #e1ece6;font-size:11px;color:var(--muted)}.table-wrap td{padding:12px 6px;border-bottom:1px solid #edf3ef;font-size:12px;font-weight:700;vertical-align:top}
    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px}.tabs::-webkit-scrollbar{display:none}.tab{border-radius:999px;padding:8px 11px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:11px;font-weight:900;white-space:nowrap}.tab.active{background:var(--teal);border-color:var(--teal);color:#fff}
    .rfid-box{display:flex;flex-direction:column;align-items:center;text-align:center;min-height:300px;justify-content:center}.rfid-ring{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,#16a34a 0,#16a34a 38%,#d1fae5 39%,#d1fae5 56%,#f0fdf4 57%);display:grid;place-items:center;box-shadow:0 18px 42px rgba(34,197,94,.25);margin:12px 0 16px}.rfid-card{width:66px;height:86px;border:3px solid #fff;border-radius:18px;display:grid;place-items:center;color:#fff;font-size:32px}.result{background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:14px;width:100%;margin-top:12px;text-align:left}
    .timeline-step{padding:14px;border-radius:18px;border:1px solid var(--line);background:var(--surface-2);margin-bottom:12px}.timeline-step b{display:block;font-size:14px}.timeline-step span{display:block;margin-top:4px;font-size:12px;line-height:1.45;color:var(--muted)}
    .drawer{position:absolute;inset:0;background:rgba(18,48,38,.44);z-index:20;display:none}.drawer.open{display:block}.drawer-panel{position:absolute;right:0;top:0;bottom:0;width:min(360px,88%);background:#fff;padding:calc(16px + var(--safe-top)) 16px 18px;transform:translateX(100%);transition:transform .2s ease;box-shadow:-12px 0 32px rgba(0,0,0,.12);overflow:auto}.drawer.open .drawer-panel{transform:none}
    .drawer-item{width:100%;display:flex;align-items:center;gap:10px;padding:13px 12px;border-radius:16px;background:#fff;color:var(--text);font-weight:850;text-align:left}.drawer-item.active{background:#ecfdf5;color:var(--teal)}
    .bottom-nav{position:absolute;left:14px;right:14px;bottom:calc(14px + var(--safe));height:76px;border-radius:24px;background:rgba(255,255,255,.95);backdrop-filter:blur(18px);display:grid;grid-template-columns:repeat(5,1fr);padding:6px;box-shadow:0 18px 46px rgba(18,48,38,.16);z-index:8;border:1px solid rgba(255,255,255,.8)}
    .nav-item{background:transparent;border-radius:18px;color:#6a8b7f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:850}.nav-item .ico{font-size:20px}.nav-item.active{background:#ecfdf5;color:var(--teal)}
    .modal{position:absolute;inset:0;background:rgba(18,48,38,.48);display:none;align-items:flex-end;z-index:30}.modal.open{display:flex}.modal-card{width:100%;max-height:88%;overflow:auto;background:#fff;border-radius:28px 28px 0 0;padding:18px 16px calc(20px + var(--safe));box-shadow:0 -24px 60px rgba(0,0,0,.18)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.close-btn{width:40px;height:40px;border-radius:14px;background:#f1f5f2;color:var(--text);font-size:22px;font-weight:900}
    .toast{position:absolute;left:18px;right:18px;bottom:calc(104px + var(--safe));background:#123026;color:#fff;padding:14px 16px;border-radius:18px;font-size:13px;font-weight:800;opacity:0;transform:translateY(18px);transition:.2s;z-index:40;box-shadow:0 14px 36px rgba(18,48,38,.25)}.toast.show{opacity:1;transform:none}
    .small-muted{font-size:12px;color:var(--muted);line-height:1.45}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const DEFAULT_STATE = {
  company:{name:'BSS Demo d.o.o.',oib:'12345678901',address:'Đakovo, Hrvatska',timezone:'Europe/Zagreb',workTime:'08:00 – 16:00'},
  workers:[
    {id:1,name:'Ivan Horvat',dept:'Proizvodnja',role:'Operater',shift:'Jutarnja',status:'Prisutan',card:'04 19 C2 8F',today:'07:42',avatar:'IH'},
    {id:2,name:'Marko Marić',dept:'Sklapanje',role:'Voditelj smjene',shift:'Jutarnja',status:'Prisutan',card:'04 A7 91 2B',today:'07:48',avatar:'MM'},
    {id:3,name:'Ana Kovač',dept:'Ured',role:'Administracija',shift:'Fleksibilna',status:'Godišnji',card:'04 7D 55 31',today:'—',avatar:'AK'},
    {id:4,name:'Petra Novak',dept:'Prodaja',role:'Komercijalist',shift:'Fleksibilna',status:'Odsutna',card:'04 2F 70 1A',today:'—',avatar:'PN'},
    {id:5,name:'Tomislav Bognar',dept:'IT podrška',role:'Administrator',shift:'Fleksibilna',status:'Prisutan',card:'04 0B 44 9C',today:'08:05',avatar:'TB'},
    {id:6,name:'Josip Jurić',dept:'Održavanje',role:'Serviser',shift:'Popodnevna',status:'Kasni',card:'04 FA 02 DD',today:'—',avatar:'JJ'}
  ],
  records:[
    {id:1,worker:'Ivan Horvat',date:'06.07.2026.',start:'07:46',end:'16:01',pause:'30 min',total:'7:45 h',status:'Uredno'},
    {id:2,worker:'Marko Marić',date:'07.07.2026.',start:'07:52',end:'16:04',pause:'30 min',total:'7:42 h',status:'Uredno'},
    {id:3,worker:'Marko Marić',date:'08.07.2026.',start:'08:12',end:'16:03',pause:'30 min',total:'7:21 h',status:'Kašnjenje'},
    {id:4,worker:'Tomislav Bognar',date:'09.07.2026.',start:'08:05',end:'—',pause:'—',total:'Aktivno',status:'Prijavljen'}
  ],
  requests:[
    {id:1,worker:'Marko Marić',type:'Godišnji odmor',period:'23.06. – 27.06.',days:'5 dana',note:'Obiteljski odmor',status:'Na čekanju'},
    {id:2,worker:'Ana Kovač',type:'Slobodan dan',period:'15.07.',days:'1 dan',note:'Privatne obveze',status:'Odobreno'},
    {id:3,worker:'Josip Jurić',type:'Godišnji odmor',period:'05.08. – 09.08.',days:'5 dana',note:'Ljetni godišnji',status:'Na čekanju'}
  ],
  corrections:[
    {id:1,worker:'Marko Marić',date:'08.07.2026.',oldValue:'Odjava: —',newValue:'Odjava: 16:02',reason:'Zaboravljena odjava',status:'Na čekanju'},
    {id:2,worker:'Ivan Horvat',date:'07.07.2026.',oldValue:'Dolazak: 08:04',newValue:'Dolazak: 07:58',reason:'Terminal je bio offline',status:'Odobreno'}
  ],
  audit:[
    {time:'10.07.2026. 07:42',user:'Sustav',module:'Terminal',action:'RFID prijava Ivana Horvata na terminalu 01.'},
    {time:'10.07.2026. 08:04',user:'Voditelj',module:'Zahtjevi',action:'Odobren slobodan dan za Anu Kovač.'},
    {time:'09.07.2026. 16:20',user:'Admin',module:'Korekcije',action:'Korekcija odjave Marka Marića: — → 16:02.'},
    {time:'09.07.2026. 08:16',user:'Admin',module:'Izvještaji',action:'Preuzet CSV izvještaj za lipanj 2026.'}
  ],
  terminal:{online:true,unsynced:0,scans:36,lastSync:'prije 48 sekundi',version:'BSS OS 0.9.4'},
  lastScan:{name:'Marko Marić',status:'Prijavljen',time:'07:48',terminal:'BSS Terminal 01',message:'Prijava prihvaćena.'},
  lastReport:'CSV preuzet 09.07.2026. 08:16'
};
let state = loadState();
let logged = localStorage.getItem('bss-polished-logged') === '1';
let screen = 'home';
let activeWorkerId = 1;
let workerTab = 'Profil';
const $ = s => document.querySelector(s);
function clone(obj){return JSON.parse(JSON.stringify(obj));}
function loadState(){try{const raw = localStorage.getItem('bss-polished-state');return raw ? JSON.parse(raw) : clone(DEFAULT_STATE);}catch(e){return clone(DEFAULT_STATE);}}
function saveState(){localStorage.setItem('bss-polished-state', JSON.stringify(state));}
function resetState(){localStorage.removeItem('bss-polished-state'); state = clone(DEFAULT_STATE); saveState();}
function now(){return new Date().toLocaleString('hr-HR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'}).replace(',', '.');}
function audit(user, action, module){state.audit.unshift({time:now(), user, action, module}); saveState();}
function toast(msg){const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(window.__toast); window.__toast = setTimeout(()=>t.classList.remove('show'),2200);}
function pill(status){let cls=''; if(['Prisutan','Uredno','Odobreno','Online','Prijavljen','Aktivna','Spremno'].includes(status)) cls='green'; else if(['Na čekanju','Kasni','Aktivno','Offline sync','MVP+'].includes(status)) cls='orange'; else if(['Odbijeno','Odsutna','Greška','Offline'].includes(status)) cls='red'; else if(['CSV/XLSX','Lipanj 2026.'].includes(status)) cls='blue'; return `<span class="pill ${cls}">${status}</span>`;}
function title(title, subtitle, right=''){return `<div class="section-title"><div><h1>${title}</h1><p>${subtitle}</p></div>${right}</div>`;}
function row(avatar, titleText, subtitle, right=''){return `<div class="row"><div class="avatar">${avatar}</div><div class="meta"><b>${titleText}</b><span>${subtitle}</span></div><div class="side">${right}</div></div>`;}
function pendingCount(){return state.requests.filter(x=>x.status==='Na čekanju').length + state.corrections.filter(x=>x.status==='Na čekanju').length;}
function navigate(next){screen = next; if(screen!=='worker') workerTab='Profil'; render();}
function topCopy(){
  const map={
    home:['Početna','Danas u firmi · '+state.company.name],
    attendance:['RFID/NFC evidencija','Prijava, odjava, greška i offline zapis'],
    mytime:['Moja evidencija','Radni sati, status dana i korekcije'],
    workers:['Radnici','Radnici, smjene i RFID kartice'],
    worker:['Detalj radnika','Profil, evidencija i kartica'],
    requests:['Zahtjevi','Godišnji i slobodni dani'],
    corrections:['Korekcije vremena','Odobravanje i audit trag'],
    reports:['Izvještaji','CSV export za obračun sati'],
    terminal:['Terminal status','Hardver, sinkronizacija i offline rad'],
    flow:['Kako radi terminal','Jednostavno objašnjenje za kupca'],
    shifts:['Smjene i pravila','Osnovna pravila evidencije'],
    roles:['Prava pristupa','Admin, voditelj, radnik, knjigovođa'],
    audit:['Audit log','Sve važne izmjene na jednom mjestu'],
    settings:['Postavke firme','Osnovna konfiguracija sustava']
  }; return map[screen] || map.home;
}
function navButton(id, ico, text){return `<button class="nav-item ${screen===id?'active':''}" onclick="navigate('${id}')"><span class="ico">${ico}</span>${text}</button>`;}
function drawerItem(id, ico, text){return `<button class="drawer-item ${screen===id?'active':''}" onclick="closeDrawer();navigate('${id}')">${ico} ${text}</button>`;}
function shell(){const [head, sub] = topCopy(); return `
  <div class="device">
    <div id="login" class="login ${logged?'hidden':''}">
      <div class="brand">
        <div class="mark">B</div>
        <h1>BSS</h1>
        <small>Smart Systems</small>
        <p>Evidencija radnog vremena preko RFID/NFC terminala. Fokus: prijava karticom, pregled sati i export za knjigovodstvo.</p>
      </div>
      <div class="glass">
        <div class="field"><label>Email ili korisničko ime</label><input value="admin@bss.hr"></div>
        <div class="field"><label>Lozinka</label><input type="password" value="demodemo"></div>
        <div class="login-row"><span>☑ Zapamti me</span><span>Zaboravili ste lozinku?</span></div>
        <button class="primary" onclick="login()">Uđi u BSS demo</button>
      </div>
      <div class="login-note">Demo firma: 24 radnika · 1 terminal · 3 smjene · CSV export · bez ERP-a, skladišta i GPS-a.</div>
    </div>
    <div id="app" class="app-shell ${logged?'':'hidden'}">
      <div class="topbar">
        <div class="mini-logo">B</div>
        <div class="top-copy"><h2>${head}</h2><p>${sub}</p></div>
        <button class="menu-btn" onclick="openDrawer()">☰</button>
      </div>
      <div class="content" id="content"></div>
      <div class="bottom-nav">
        ${navButton('home','⌂','Početna')}
        ${navButton('attendance','◴','Evidencija')}
        ${navButton('workers','☷','Radnici')}
        ${navButton('requests','□','Zahtjevi')}
        ${navButton('reports','⇩','Izvještaji')}
      </div>

function viewAttendance(){const l=state.lastScan;return `

function scanToggle(){const worker = state.workers.find(w=>w.name==='Marko Marić'); const out = worker.status==='Prisutan'; const time = new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}); worker.status = out ? 'Odsutna' : 'Prisutan'; worker.today = out ? '—' : time; state.terminal.scans += 1; state.lastScan = {name:worker.name,status:out?'Odjavljen':'Prijavljen',time,terminal:'BSS Terminal 01',message:out?'Odjava prihvaćena. Ukupno danas: 8:14 h':'Prijava prihvaćena.'}; audit('Sustav', `${worker.name}: ${state.lastScan.status.toLowerCase()} karticom.`, 'Terminal'); saveAndRender(`${worker.name}: ${state.lastScan.status}`);}
function unknownCard(){state.lastScan={name:'UID 04 A7 91 2B',status:'Greška',time:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),terminal:'BSS Terminal 01',message:'Kartica nije dodijeljena radniku.'}; audit('Sustav','Odbijena nepoznata RFID kartica 04 A7 91 2B.','Terminal'); saveAndRender('Nepoznata kartica odbijena.');}

function viewSettings(){const c=state.company; return `${title('Postavke firme','Osnovna konfiguracija bez enterprise viška.')}<div class="card"><div class="form"><label>Naziv firme<input id="setName" value="${c.name}"></label><label>OIB<input id="setOib" value="${c.oib}"></label><label>Adresa<input id="setAddress" value="${c.address}"></label><label>Standardno radno vrijeme<input id="setWorkTime" value="${c.workTime}"></label><button class="btn block" onclick="saveSettings()">Spremi postavke</button></div></div><div class="card"><h2>MVP granica</h2><p class="small-muted">Nema skladišta, ERP-a, GPS-a, AI analitike ni payroll obračuna u prvoj verziji. Fokus ostaje evidencija sati + RFID terminal + export.</p></div>`;}
function saveSettings(){state.company.name=$('#setName').value.trim(); state.company.oib=$('#setOib').value.trim(); state.company.address=$('#setAddress').value.trim(); state.company.workTime=$('#setWorkTime').value.trim(); audit('Admin','Promijenjene postavke firme.','Postavke'); saveAndRender('Postavke spremljene.');}

function openWorkerModal(){const modal=$('#modal'); modal.innerHTML=`<div class="modal-card"><div class="modal-head"><h2 style="margin:0">Dodaj radnika</h2><button class="close-btn" onclick="closeModal()">×</button></div><div class="form"><label>Ime i prezime<input id="newName" value="Luka Babić"></label><label>Odjel<select id="newDept"><option>Proizvodnja</option><option>Sklapanje</option><option>Ured</option><option>Prodaja</option><option>Održavanje</option></select></label><label>Radno mjesto<input id="newRole" value="Operater"></label><label>Smjena<select id="newShift"><option>Jutarnja</option><option>Popodnevna</option><option>Noćna</option><option>Fleksibilna</option></select></label><label>RFID UID<input id="newCard" value="04 88 21 AB"></label><button class="btn block" onclick="addWorker()">Spremi radnika</button></div></div>`; modal.classList.add('open');}
function closeModal(){$('#modal').classList.remove('open');}
function addWorker(){const name=$('#newName').value.trim(); if(!name){toast('Unesi ime radnika.'); return;} const avatar=name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase(); state.workers.push({id:Date.now(),name,dept:$('#newDept').value,role:$('#newRole').value.trim(),shift:$('#newShift').value,status:'Odsutna',card:$('#newCard').value.trim(),today:'—',avatar}); audit('Admin',`Dodan radnik ${name} i dodijeljena RFID kartica.`, 'Radnici'); closeModal(); saveAndRender('Radnik dodan u listu.'); navigate('workers');}
function closeAllModals(){closeModal(); closeDrawer();}
function resetDemo(){resetState(); logged=true; localStorage.setItem('bss-polished-logged','1'); closeAllModals(); render(); toast('Demo podaci su vraćeni na početno stanje.');}

render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
</body>
</html>

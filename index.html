font-weight:900;padding:13px 15px;box-shadow:0 12px 28px rgba(37,99,235,.22)}.btn.secondary{background:#fff;color:var(--t);border:1px solid #dbe4ef;box-shadow:none}.btn.ok{background:var(--g)}.btn.bad{background:var(--r)}.btn.block{width:100%}.btn:disabled{opacity:.55}.tabs{display:flex;gap:7px;overflow:auto;margin-bottom:12px}.tab{border-radius:999px;background:#fff;border:1px solid #dce6f1;color:#64748b;padding:8px 11px;font-size:11px;font-weight:900}.tab.on{background:var(--b);color:#fff}.form{display:grid;gap:11px}.form label{display:grid;gap:6px;font-size:12px;color:var(--m);font-weight:850}.form input,.form select,.form textarea{width:100%;border:1px solid #dbe4ef;background:#fff;border-radius:15px;padding:12px;color:var(--t);outline:none}.tbl{overflow:auto}.tbl table{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}.tbl th{text-align:left;color:var(--m);font-size:11px;padding:9px 6px;border-bottom:1px solid #e2e8f0}.tbl td{padding:11px 6px;border-bottom:1px solid #eef2f7;font-weight:700;vertical-align:top}.rfid{min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.ring{width:156px;height:156px;border-radius:50%;background:radial-gradient(circle,#2563eb 0,#2563eb 38%,#dbeafe 39%,#dbeafe 56%,#eff6ff 57%);display:grid;place-items:center;box-shadow:0 22px 55px rgba(37,99,235,.24);margin:10px 0 16px}.cardicon{width:64px;height:84px;border-radius:16px;border:3px solid white;display:grid;place-items:center;color:white;font-size:31px}.result{border-radius:20px;background:#f8fafc;border:1px solid #e2e8f0;padding:14px;margin-top:14px;width:100%;text-align:left}.step{padding:14px;border-radius:18px;border:1px solid #e2e8f0;background:#f8fafc;margin-bottom:12px}.step b{display:block;font-size:14px}.step span{display:block;color:var(--m);font-size:12px;line-height:1.45;margin-top:4px}.drawer{position:absolute;inset:0;background:rgba(8,26,49,.45);z-index:20;opacity:0;pointer-events:none}.drawer.op Scan:{kind:'success',name:'Marko Marić',status:'Prijavljen',time:'07:48',terminal:'BSS Terminal 01',message:'Prijava prihvaćena.'},lastReport:null,audit:[{time:'09.07.2026. 08:16',user:'Admin',action:'Export izvještaja za lipanj 2026.',module:'Izvještaji'},{time:'09.07.2026. 08:03',user:'Voditelj',action:'Odobren godišnji za Anu Kovač.',module:'Zahtjevi'},{time:'08.07.2026. 16:20',user:'Admin',action:'Korekcija odjave: — → 16:02 za Marka Marića.',module:'Korekcije'},{time:'08.07.2026. 07:58',user:'Sustav',action:'RFID kartica 04 19 C2 8F očitana na terminalu 01.',module:'Terminal'}]};
let S=JSON.parse(localStorage.bssState||'null')||structuredClone(DEF), screen='home', logged=localStorage.bssLogged==='1', tab='Profil'; const $=q=>document.querySelector(q); const now=()=>new Date().toLocaleString('hr-HR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',',''); const save=()=>localStorage.bssState=JSON.stringify(S); const audit=(u,a,m)=>{S.audit.unshift({time:now(),user:u,action:a,module:m});save()};
function pill(x){let c=['Prisutan','Uredno','Odobreno','Online','Prijavljen','Aktivna'].includes(x)?'green':['Kasni','Na čekanju','Aktivno','Offline sync'].includes(x)?'orange':['Odbijeno','Odsutna','Greška','Offline'].includes(x)?'red':'';return `<span class="pill ${c}">${x}</span>`} function toast(m){$('.toast').textContent=m;$('.toast').classList.add('show');setTimeout(()=>$('.toast').classList.remove('show'),2300)} function set(s){screen=s;tab='Profil';render()} function title(t,p,r=''){return `<div class="title"><div><h1>${t}</h1>${p?`<p>${p}</p>`:''}</div>${r}</div>`} const pending=()=>S.requests.filter(x=>x.status==='Na čekanju').length+S.corrections.filter(x=>x.status==='Na čekanju').length;
function shell(){return `<div class="app"><div id="login" class="login ${logged?'hidden':''}"><div class="brand"><div class="mark">B</div><h1>BSS</h1><small>SMART SYSTEMS</small><p>Evidencija radnog vremena preko RFID/NFC terminala. Demo firma: 24 radnika · 1 terminal · export za knjigovodstvo.</p></div><div class="field"><label>Email ili korisničko ime</label><input value="admin@bss.hr"></div><div class="field"><label>Lozinka</label><input type="password" value="demodemo"></div><div class="login-row"><span>☑ Zapamti me</span><span>Zaboravili ste lozinku?</span></div><button class="primary" onclick="login()">Uđi u BSS demo</button><div class="login-note">MVP+ prodajni demo · bez ERP-a, skladišta, GPS-a i nepotrebnih modula.</div></div><div id="main" class="${logged?'':'hidden'}"><div class="top"><div class="mini">B</div><div class="tc"><div class="tt" id="tt"></div><div class="ts" id="ts"></div></div><button class="menu" onclick="drawer(1)">☰</button></div><div class="content" id="content"></div><div class="nav">${nav('home','⌂','Početna')}${nav('attendance','◴','Evidencija')}${nav('workers','☷','Radnici')}${nav('requests','□','Zahtjevi')}${nav('reports','⇩','Izvještaji')}</div></div><div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')drawer(0)"><div class="panel"><div class="mh"><b>BSS meni</b><button class="x" onclick="drawer(0)">×</button></div>${['home:⌂:Početna','attendance:◴:RFID/NFC evidencija','mytime:◷:Moja evidencija','workers:☷:Radnici i kartice','shifts:↺:Smjene i pravila','requests:□:Godišnji zahtjevi','corrections:✎:Korekcije vremena','reports:⇩:Izvještaji CSV/XLSX','terminal:◉:Terminal status','flow:→:Kako radi terminal','roles:♙:Prava pristupa','audit:☰:Audit log','settings:⚙:Postavke'].map(x=>{let [id,ic,tx]=x.split(':');return `<button class="di ${screen===id?'on':''}" onclick="set('${id}');drawer(0)">${ic} ${tx}</button>`}).join('')}<button class="di" onclick="resetDemo()">↻ Reset demo podataka</button></div></div><div class="modal" id="modal"></div><div class="toast"></div></div>`} function nav(id,ic,tx){return `<button class="${screen===id?'on':''}" onclick="set('${id}')"><span class="ico">${ic}</span>${tx}</button>`} function login(){logged=true;localStorage.bssLogged='1';render();toast('Dobrodošli u BSS MVP+ demo.')} function drawer(o){$('#drawer').classList.toggle('open',!!o)}
function home(){let present=S.workers.filter(w=>w.status==='Prisutan').length, late=S.workers.filter(w=>w.status==='Kasni').length;return `${title('Danas u firmi','Pregled radnog vremena bez ručnog Excela.',pill(S.terminal.online?'Online':'Offline'))}<div class="card dark"><h2 style="margin:0;font-size:22px">Evidencija spremna za obračun</h2><div class="note">Radnici se prijavljuju karticom, voditelj prati stanje u realnom vremenu, a na kraju mjeseca ide CSV export za knjigovodstvo.</div><div class="sales"><span>Ovaj mjesec evidentirano</span><b>3.842 h</b></div></div><div class="grid"><div class="stat"><div class="num">${S.workers.length}</div><div class="lab">Ukupno radnika</div><div class="trend">+ radnici se mogu dodati</div></div><div class="stat"><div class="num">${present}</div><div class="lab">Trenutno prisutno</div><div class="trend">Terminal sinkroniziran</div></div><div class="stat"><div class="num">${late}</div><div class="lab">Kašnjenja danas</div><div class="trend" style="color:var(--o)">Provjera voditelja</div></div><div class="stat"><div class="num">${pending()}</div><div class="lab">Zahtjeva na čekanju</div><div class="trend" style="color:var(--o)">Godišnji / korekcije</div></div></div><div class="card"><h2>Brze akcije</h2><div class="quick"><button onclick="set('attendance')"><b>RFID prijava</b><span>Simuliraj dolazak, odjavu ili grešku</span></button><button onclick="downloadCSV()"><b>Preuzmi CSV</b><span>Datoteka za obračun sati</span></button><button onclick="openWorkerModal()"><b>Dodaj radnika</b><span>Stvarno se dodaje u listu</span></button><button onclick="set('terminal')"><b>Offline test</b><span>Provjeri lokalno spremanje</span></button></div></div><div class="card"><h2>Zadnje aktivnosti</h2>${S.audit.slice(0,4).map(a=>row(a.user[0]||'S',a.action,`${a.time} · ${a.user} · ${a.module}`)).join('')}</div>`}
function row(av,b,s,right=''){return `<div class="row"><div class="av">${av}</div><div class="meta"><b>${b}</b><span>${s}</span></div>${right}</div>`}
function attendance(){let l=S.lastScan;return `${title('RFID/NFC evidencija','Prikaz prijave, odjave, nepoznate kartice i offline rada.')}<div class="card rfid"><span class="pill ${S.terminal.online?'green':'red'}">${S.terminal.online?'Terminal online':'Terminal offline'} · Ulaz proizvodnje</span><div class="ring"><div class="cardicon">≋</div></div><h2>Prislonite RFID karticu</h2><p style="color:var(--m);font-size:13px;line-height:1.4">Terminal daje zvučnu potvrdu i šalje zapis u aplikaciju. Ako internet padne, zapis ostaje lokalno spremljen.</p><div class="result"><div class="sum"><span>Radnik / kartica</span><b>${l.name}</b></div><div class="sum"><span>Status</span><b>${pill(l.status)}</b></div><div class="sum"><span>Vrijeme</span><b>${l.time}</b></div><div class="sum"><span>Poruka</span><b>${l.message}</b></div></div><div class="btns"><button class="btn" onclick="scan()">Simuliraj očitanje</button><button class="btn secondary" onclick="unknownCard()">Nepoznata kartica</button><button class="btn secondary" onclick="offlineScan()">Offline prijava</button></div></div><div class="card"><h2>Realne situacije</h2><div class="sum"><span>Izgubljena kartica</span><b>Blokiranje + zamjena</b></div><div class="sum"><span>Zaboravljena odjava</span><b>Korekcija s odobrenjem</b></div><div class="sum"><span>Internet nije dostupan</span><b>Lokalno spremanje</b></div></div>`}
function scan(){let w=S.workers.find(x=>x.name==='Marko Marić')||S.workers[0], out=w.status==='Prisutan';w.status=out?'Odsutna':'Prisutan';w.today=out?'—':new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'});S.terminal.scans++;S.lastScan={name:w.name,status:out?'Odjavljen':'Prijavljen',time:w.today==='—'?new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}):w.today,terminal:'BSS Terminal 01',message:out?'Odjava prihvaćena. Ukupno danas: 8:14 h':'Prijava prihvaćena.'};audit('Sustav',`${w.name}: ${S.lastScan.status} karticom.`, 'Terminal');render();toast(`${w.name}: ${S.lastScan.status}`)} function unknownCard(){S.lastScan={name:'UID 04 A7 91 2B',status:'Greška',time:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),terminal:'BSS Terminal 01',message:'Kartica nije dodijeljena radniku.'};audit('Sustav','Odbijena nepoznata RFID kartica 04 A7 91 2B.','Terminal');render();toast('Nepoznata kartica odbijena.')} function offlineScan(){S.terminal.online=false;S.terminal.unsynced++;S.lastScan={name:'Ivan Horvat',status:'Offline sync',time:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),terminal:'BSS Terminal 01',message:'Zapis spremljen lokalno.'};audit('Terminal','Offline prijava spremljena lokalno.','Terminal');save();render();toast('Zapis je lokalno spremljen.')}
function workers(){return `${title('Radnici','Upravljanje zaposlenicima, smjenama i RFID karticama.',`<button class="btn" onclick="openWorkerModal()">Dodaj</button>`)}<div class="tabs"><button class="tab on">Svi</button><button class="tab">Prisutni</button><button class="tab">Godišnji</button></div><div class="card">${S.workers.map(w=>`<div class="row" onclick="workerDetail(${w.id})"><div class="av">${w.avatar}</div><div class="meta"><b>${w.name}</b><span>${w.dept} · ${w.role} · ${w.shift}<br>RFID: ${w.card}</span></div>${pill(w.status)}</div>`).join('')}</div><div class="card"><div class="sum"><span>Aktivne RFID kartice</span><b>${S.workers.length}</b></div><div class="sum"><span>Radnici bez kartice</span><b>0</b></div></div>`} function workerDetail(id){let w=S.workers.find(x=>x.id==id);screen='worker';window.currentWorker=id;renderWorker(w)} function renderWorker(w=S.workers.find(x=>x.id==window.currentWorker)||S.workers[0]){let body=tab==='Profil'?`<div class="sum"><span>Odjel</span><b>${w.dept}</b></div><div class="sum"><span>Radno mjesto</span><b>${w.role}</b></div><div class="sum"><span>Smjena</span><b>${w.shift}</b></div><div class="sum"><span>RFID UID</span><b>${w.card}</b></div><div class="sum"><span>Danas</span><b>${w.today}</b></div>`:tab==='Evidencija'?records(w.name):tab==='RFID kartica'?`<div class="sum"><span>UID kartice</span><b>${w.card}</b></div><div class="sum"><span>Status</span><b>${pill('Aktivna')}</b></div><button class="btn secondary block" onclick="toast('Kartica je blokirana i spremna za zamjenu.');audit('Admin','Blokirana RFID kartica za ${w.name}.','Radnici')">Blokiraj / zamijeni karticu</button>`:S.corrections.filter(c=>c.worker===w.name).map(c=>row('K',`${c.oldValue} → ${c.newValue}`,`${c.date} · ${c.reason}`,pill(c.status))).join('')||'<p>Nema korekcija.</p>';$('#content').innerHTML=`<div class="screen">${title(w.name,`${w.dept} · ${w.role}`,pill(w.status))}<div class="card"><div class="tabs">${['Profil','Evidencija','RFID kartica','Korekcije'].map(t=>`<button class="tab ${tab===t?'on':''}" onclick="tab='${t}';renderWorker()">${t}</button>`).join('')}</div>${body}</div></div>`;updateHead()}
function mytime(){return `${title('Moja evidencija','Pregled dolazaka, odlazaka, pauza i statusa dana.',pill('Lipanj 2026.'))}<div class="card"><div class="grid"><div class="stat"><div class="num">168:45</div><div class="lab">Ukupno sati</div></div><div class="stat"><div class="num">6:45</div><div class="lab">Prekovremeno</div></div></div></div>${records()}<div class="card"><h2>Zahtjev za korekciju</h2><div class="form"><label>Datum<input id="corrDate" value="08.07.2026."></label><label>Razlog<textarea id="corrReason">Zaboravljena odjava nakon završetka smjene.</textarea></label><button class="btn block" onclick="addCorrection()">Pošalji zahtjev</button></div></div>`} function records(worker){let rows=(worker?S.records.filter(r=>r.worker===worker):S.records);return `<div class="card tbl"><table><thead><tr><th>Radnik</th><th>Datum</th><th>Dolazak</th><th>Odlazak</th><th>Ukupno</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.worker}</td><td>${r.date}<br>${pill(r.status)}</td><td>${r.start}</td><td>${r.end}</td><td>${r.total}</td></tr>`).join('')}</tbody></table></div>`}
function addCorrection(){let id=Date.now();S.corrections.unshift({id,worker:'Tomislav Bognar',date:$('#corrDate').value,oldValue:'Odjava: —',newValue:'Odjava: 16:02',reason:$('#corrReason').value,status:'Na čekanju'});audit('Radnik','Poslan zahtjev za korekciju vremena.','Korekcije');save();set('corrections');toast('Zahtjev za korekciju poslan voditelju.')}
function requests(){return `${title('Zahtjevi za godišnji','Odobravanje godišnjih i slobodnih dana.',pill(`${S.requests.filter(x=>x.status==='Na čekanju').length} na čekanju`))}<div class="card">${S.requests.map(r=>`<div class="row"><div class="meta"><b>${r.worker}</b><span>${r.type} · ${r.period} · ${r.days}<br>${r.note}</span></div>${pill(r.status)}${r.status==='Na čekanju'?`<div class="btns"><button class="btn ok" onclick="req(${r.id},'Odobreno')">Odobri</button><button class="btn bad" onclick="req(${r.id},'Odbijeno')">Odbij</button></div>`:''}</div>`).join('')}</div>`} function req(id,st){let r=S.requests.find(x=>x.id===id);r.status=st;audit('Voditelj',`${st} zahtjev: ${r.worker} · ${r.period}.`,'Zahtjevi');save();render();toast(`Zahtjev: ${st}`)}
function corrections(){return `${title('Korekcije vremena','Svaka ručna izmjena ima razlog i audit zapis.')}<div class="card">${S.corrections.map(c=>`<div class="row"><div class="meta"><b>${c.worker}</b><span>${c.date} · ${c.oldValue} → ${c.newValue}<br>${c.reason}</span></div>${pill(c.status)}${c.status==='Na čekanju'?`<div class="btns"><button class="btn ok" onclick="corr(${c.id},'Odobreno')">Odobri</button><button class="btn bad" onclick="corr(${c.id},'Odbijeno')">Odbij</button></div>`:''}</div>`).join('')}</div><div class="card dark"><h2>Kontrola manipulacije sati</h2><div class="note">Vrijeme se može korigirati samo kroz kontrolirani zahtjev. Stara vrijednost, nova vrijednost, korisnik, razlog i vrijeme izmjene ostaju u audit logu.</div></div>`} function corr(id,st){let c=S.corrections.find(x=>x.id===id);c.status=st;audit('Voditelj',`${st} korekcija za ${c.worker}: ${c.oldValue} → ${c.newValue}.`,'Korekcije');save();render();toast(`Korekcija: ${st}`)}
function reports(){return `${title('Izvještaji','Export za knjigovodstvo i obračun sati.',pill('CSV/XLSX'))}<div class="card"><div class="form"><label>Period<select><option>01.06.2026. – 30.06.2026.</option><option>01.07.2026. – 31.07.2026.</option></select></label><label>Radnici<select><option>Svi aktivni radnici</option><option>Samo proizvodnja</option><option>Jedan radnik</option></select></label><label>Vrsta izvještaja<select><option>Mjesečna evidencija radnog vremena</option><option>Kašnjenja i nepotpuni dani</option><option>Godišnji i odsutnosti</option><option>Korekcije vremena</option></select></label><button class="btn block" onclick="genReport()">Generiraj izvještaj</button></div></div><div class="card"><h2>Export za obračun plaće</h2><div class="sum"><span>Format</span><b>CSV sada radi · XLSX kasnije</b></div><div class="sum"><span>Sadržaj</span><b>dolasci, odlasci, pauza, ukupni sati</b></div><div class="sum"><span>Status</span><b>${S.lastReport?S.lastReport:'Spremno za generiranje'}</b></div><div class="btns"><button class="btn" onclick="downloadCSV()">Preuzmi CSV</button><button class="btn secondary" onclick="toast('XLSX je planiran za sljedeći razvojni korak.')">Preuzmi XLSX</button></div></div>${records()}`}
function genReport(){S.lastReport=`Generirano ${now()}`;audit('Admin','Generiran mjesečni izvještaj radnog vremena.','Izvještaji');save();render();toast('Izvještaj generiran.')} function downloadCSV(){let head=['Radnik','Datum','Dolazak','Odlazak','Pauza','Ukupno','Status'];let rows=S.records.map(r=>[r.worker,r.date,r.start,r.end,r.pause,r.total,r.status]);let csv=[head,...rows].map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');let blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BSS_evidencija_radnog_vremena_06_2026.csv';a.click();URL.revokeObjectURL(a.href);S.lastReport=`CSV preuzet ${now()}`;audit('Admin','Preuzet CSV izvještaj za obračun sati.','Izvještaji');save();toast('CSV izvještaj preuzet.')}
function terminal(){return `${title('Terminal status','Osnovni nadzor hardvera i offline sync.',pill(S.terminal.online?'Online':'Offline'))}<div class="card dark"><h2>BSS Terminal 01</h2><p style="color:#b8c7d9">Ulaz proizvodnje · RFID/NFC prijava i odjava</p><div class="sales"><span>Zadnja sinkronizacija</span><b>${S.terminal.lastSync}</b></div></div><div class="card"><div class="sum"><span>Današnja očitanja</span><b>${S.terminal.scans}</b></div><div class="sum"><span>Neposlani zapisi</span><b>${S.terminal.unsynced}</b></div><div class="sum"><span>Status mreže</span><b>${S.terminal.online?'Wi‑Fi online':'Wi‑Fi offline'}</b></div><div class="sum"><span>Verzija uređaja</span><b>${S.terminal.version}</b></div><div class="btns"><button class="btn secondary" onclick="termOff()">Simuliraj pad interneta</button><button class="btn" onclick="termOn()">Vrati vezu / sinkroniziraj</button></div></div><div class="card"><h2>Offline način</h2><p style="color:var(--m);font-size:13px;line-height:1.45">Ako internet padne, terminal lokalno sprema prijave i sinkronizira ih kada se veza vrati. To sprječava gubitak evidencije.</p></div>`} function termOff(){S.terminal.online=false;S.terminal.unsynced+=3;S.terminal.lastSync='prije 12 min';audit('Terminal','Simuliran pad interneta. 3 zapisa čekaju sinkronizaciju.','Terminal');save();render();toast('Terminal je offline. Zapisi se spremaju lokalno.')} function termOn(){S.terminal.online=true;S.terminal.unsynced=0;S.terminal.lastSync='upravo sada';audit('Terminal','Veza vraćena. Lokalni zapisi sinkronizirani.','Terminal');save();render();toast('Terminal sinkroniziran.')}
function flow(){return `${title('Kako radi BSS terminal','Proces koji kupcu objašnjava proizvod u 10 sekundi.')}<div class="card">${['Radnik prisloni RFID karticu|Kartica je dodijeljena radniku u BSS aplikaciji.','Terminal potvrdi prijavu zvukom|Radnik odmah zna da je prijava ili odjava prihvaćena.','Podatak se šalje u aplikaciju|Admin vidi vrijeme, radnika, status i terminal.','Voditelj prati evidenciju|Kašnjenja, nepotpuni dani i korekcije vidljivi su bez Excela.','Na kraju mjeseca ide export|CSV izvještaj spreman je za knjigovodstvo ili obračun plaće.'].map((x,i)=>{let[a,b]=x.split('|');return `<div class="step"><b>${i+1}. ${a}</b><span>${b}</span></div>`}).join('')}</div><div class="card dark"><h2>Što prodajemo?</h2><div class="note">Manje ručnog rada, manje grešaka, jasna evidencija i brži obračun sati.</div></div>`}
function shifts(){return `${title('Smjene i pravila','MVP smjene bez kompleksnog ERP planera.')}<div class="card">${[['Jutarnja','06:00 – 14:00','Pauza 30 min · tolerancija 5 min'],['Popodnevna','14:00 – 22:00','Pauza 30 min · tolerancija 5 min'],['Noćna','22:00 – 06:00','Osnovna evidencija, obračun kasnije'],['Fleksibilna','Po potrebi','Za ured i administraciju']].map(s=>row('S',s[0],`${s[1]} · ${s[2]}`,pill('Aktivna'))).join('')}</div><div class="card"><div class="sum"><span>Standardni dan</span><b>8:00 h</b></div><div class="sum"><span>Zaokruživanje</span><b>na 5 min</b></div><div class="sum"><span>Prekovremeno</span><b>označeno, ne obračunato</b></div></div>`}
function roles(){return `${title('Prava pristupa','Jasne role bez overengineeringa.')}<div class="card">${[['Admin firme','Vidi sve radnike, smjene, zahtjeve, korekcije i izvještaje.'],['Voditelj','Vidi svoj odjel i odobrava zahtjeve svoga tima.'],['Radnik','Vidi svoju evidenciju i šalje zahtjeve.'],['Knjigovođa','Čita i izvozi izvještaje za obračun sati.']].map(r=>row('R',r[0],r[1],pill('Aktivna'))).join('')}</div>`} function auditLog(){return `${title('Audit log','Transparentan trag svih važnih izmjena.')}<div class="card">${S.audit.map(a=>row(a.user[0]||'S',a.action,`${a.time} · ${a.user} · ${a.module}`)).join('')}</div>`} function settings(){let c=S.company;return `${title('Postavke firme','Osnovna konfiguracija bez enterprise viška.')}<div class="card"><div class="form"><label>Naziv firme<input id="coName" value="${c.name}"></label><label>OIB<input id="coOib" value="${c.oib}"></label><label>Adresa<input id="coAdr" value="${c.address}"></label><label>Standardno radno vrijeme<input id="coWork" value="${c.workTime}"></label><button class="btn block" onclick="saveSettings()">Spremi postavke</button></div></div><div class="card"><h2>MVP granica</h2><p style="color:var(--m);line-height:1.45">Nema skladišta, ERP-a, GPS-a, AI analitike ni payroll obračuna u prvoj verziji. Fokus ostaje evidencija sati + RFID terminal + export.</p></div>`} function saveSettings(){S.company={...S.company,name:$('#coName').value,oib:$('#coOib').value,address:$('#coAdr').value,workTime:$('#coWork').value};audit('Admin','Promijenjene postavke firme.','Postavke');save();toast('Postavke spremljene.')}
function openWorkerModal(){let id='w'+Date.now();$('#modal').innerHTML=`<div class="modal-card"><div class="mh"><h2>Dodaj radnika</h2><button class="x" onclick="closeModal()">×</button></div><div class="form"><label>Ime i prezime<input id="${id}name" value="Luka Babić"></label><label>Odjel<select id="${id}dept"><option>Proizvodnja</option><option>Sklapanje</option><option>Ured</option><option>Prodaja</option><option>Održavanje</option></select></label><label>Radno mjesto<input id="${id}role" value="Operater"></label><label>Smjena<select id="${id}shift"><option>Jutarnja</option><option>Popodnevna</option><option>Noćna</option><option>Fleksibilna</option></select></label><label>RFID UID<input id="${id}card" value="04 88 21 AB"></label><button class="btn block" onclick="addWorker('${id}')">Spremi radnika</button></div></div>`;$('#modal').classList.add('open')} function closeModal(){$('#modal').classList.remove('open')} function addWorker(id){let name=$('#'+id+'name').value.trim();if(!name)return toast('Unesi ime radnika.');let av=name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();S.workers.push({id:Date.now(),name,dept:$('#'+id+'dept').value,role:$('#'+id+'role').value,shift:$('#'+id+'shift').value,status:'Odsutna',card:$('#'+id+'card').value,today:'—',avatar:av});audit('Admin',`Dodan radnik ${name} i dodijeljena RFID kartica.`,'Radnici');save();closeModal();set('workers');toast('Radnik dodan u listu.')}
function resetDemo(){localStorage.removeItem('bssState');S=structuredClone(DEF);save();render();toast('Demo podaci resetirani.')} function updateHead(){let map={home:['Početna','Danas u firmi · '+S.company.name],attendance:['RFID/NFC evidencija','Prijava, odjava i offline zapis'],mytime:['Moja evidencija','Radni sati i korekcije'],workers:['Radnici','Radnici, smjene i RFID kartice'],worker:['Detalj radnika','Profil, evidencija i kartica'],requests:['Zahtjevi','Godišnji i slobodni dani'],corrections:['Korekcije vremena','Odobrenje i audit trag'],reports:['Izvještaji','CSV export za obračun'],terminal:['Terminal status','Hardver i offline sync'],flow:['Kako radi terminal','Prodajni prikaz procesa'],shifts:['Smjene i pravila','Osnovna pravila evidencije'],roles:['Prava pristupa','Admin, voditelj, radnik, knjigovođa'],audit:['Audit log','Sve važne izmjene'],settings:['Postavke firme','Osnovna konfiguracija']};let [a,b]=map[screen]||map.home;$('#tt').textContent=a;$('#ts').textContent=b}
function render(){document.getElementById('root').innerHTML=shell(); if(logged){let html={home:home,attendance:attendance,mytime:mytime,workers:workers,requests:requests,corrections:corrections,reports:reports,terminal:terminal,flow:flow,shifts:shifts,roles:roles,audit:auditLog,settings:settings}[screen]?.()||home(); $('#content').innerHTML=`<div class="screen">${html}</div>`; updateHead();}} render(); if('serviceWorker' in navigator) addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script></body></html>

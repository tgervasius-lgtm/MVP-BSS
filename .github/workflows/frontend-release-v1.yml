name: BSS Frontend Release v1.0.0

on:
  push:
    branches: [main]
    paths:
      - BSS_FRONTEND_RELEASE_V1.md
      - .github/workflows/frontend-release-v1.yml

permissions:
  contents: write

jobs:
  release:
    name: publish-frontend-v1.0.0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify lint, tests and build
        run: npm run check:frontend

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify browser E2E and axe
        run: npm run test:e2e -- --reporter=line

      - name: Validate frozen release notes
        run: |
          grep -Fq 'FRONTEND FROZEN' BSS_FRONTEND_RELEASE_V1.md
          grep -Fq 'frontend-v1.0.0' BSS_FRONTEND_RELEASE_V1.md
          grep -Fq 'Backend Contract Review' BSS_FRONTEND_RELEASE_V1.md

      - name: Create immutable frontend release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view frontend-v1.0.0 >/dev/null 2>&1; then
            echo 'Release frontend-v1.0.0 already exists; nothing to do.'
            exit 0
          fi
          gh release create frontend-v1.0.0 \
            --target "$GITHUB_SHA" \
            --title 'BSS Frontend v1.0.0' \
            --notes-file BSS_FRONTEND_RELEASE_V1.md

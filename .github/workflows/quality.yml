name: BSS quality gate

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'agent/**'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Build Cloudflare Pages output
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser E2E and axe
        run: npm run test:e2e -- --reporter=line

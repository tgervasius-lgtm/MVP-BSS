services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bss
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bss"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - bss-postgres-data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: bss_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bss_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  bss-postgres-data:
